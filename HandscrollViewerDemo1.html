
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高其佩指墨长卷 - 43寸4K首映</title>
    <script src="https://maggielhlyc.github.io/shoujuan-zoomify/handscrollviewer1.js"></script>
    <script src="https://maggielhlyc.github.io/shoujuan-zoomify/openseadragon-bin-2.2.1/openseadragon.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
        }
        #handscrollviewer-main {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div id="handscrollviewer-main"></div>

    <script>
        window.onload = function() {
            // 2. 移除中括号，直接使用字符串路径，这是最古老也最稳的写法
            var viewer = new HandscrollViewer({
                id: "handscrollviewer-main",
                tileSources: "https://maggielhlyc.github.io/shoujuan-zoomify/ImageProperties.xml",
                
                // 3. 自动开卷参数
                autoScroll: true,
                autoScrollSpeed: 0.1,
                autoScrollDirection: "right-to-left",
                
                // 4. 4K屏纯净显示设置
                showNavigationControl: false,
                immediateRender: true,
                visibilityRatio: 1.0,
                constrainDuringPan: true,
                defaultZoomLevel: 1
            });
            
            console.log("正在尝试从云端加载高其佩 21119 像素长卷...");
        };
    </script>
</body>
</html>
