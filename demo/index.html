<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 11.0 旗舰展陈版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        /* 彻底清除浏览器默认边距，确保背景色全屏覆盖 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root { 
            --bg-color: #221F1C; 
            --accent-color: #d4a017;
            --panel-bg: rgba(30, 25, 20, 0.98);
            --text-color: rgba(230, 210, 180, 0.9);
        }
        
        html, body { 
            width: 100%; height: 100%; 
            background: var(--bg-color); 
            overflow: hidden; 
            font-family: "STSong", "SimSun", serif; 
            color: var(--text-color);
            cursor: none; 
        }
        
        /* 1. 核心展示区：确保 100% 充满屏幕 */
        #viewer { 
            width: 100vw; height: 100vh; 
            background: var(--bg-color); 
            filter: contrast(1.05) sepia(0.04);
        }
        body.paused { cursor: default; }

        /* 2. 导览图（红框全图）：横向铺满 100% 宽度 */
        #navi-outer {
            position: absolute; top: 0; left: 0; width: 100vw;
            display: flex; justify-content: center; z-index: 150;
            pointer-events: none;
        }
        #navi-container {
            width: 100vw; height: 7vh; /* 宽度设为 100vw 撑满全屏 */
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(212, 160, 23, 0.2);
            opacity: 0.6;
            transition: all 0.4s;
        }
        body.paused #navi-container {
            opacity: 1;
            height: 9vh; /* 暂停时稍微加高，方便观察 */
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--accent-color);
            pointer-events: auto;
            transform: translateY(12vh); /* 避开顶部的作品名 */
        }

        /* 3. 顶部标题区：针对长标题优化 */
        #header-zone {
            position: absolute; top: -25vh; left: 0; width: 100%; height: 15vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            transition: top 0.4s ease; z-index: 100;
            padding: 0 5vw;
        }
        body.paused #header-zone { top: 0; }
        #art-title { 
            font-size: 3.2vh; /* 稍微调小一点，防止长标题换行 */
            color: var(--accent-color); 
            letter-spacing: 4px; 
            font-weight: bold; 
            text-align: center;
            line-height: 1.2;
        }

        /* 4. 底部控制栏：针对 4K 屏优化按键大小 */
        #control-bar {
            position: absolute; bottom: -15vh; left: 0; width: 100%; height: 12vh;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            transition: all 0.4s ease; z-index: 110;
            padding: 0 20px;
        }
        body.paused #control-bar { bottom: 0; }
        body.show-details #control-bar { bottom: 40vh; background: none; }

        /* 5. 作品志面板：彻底隐藏 */
        #details-panel {
            position: absolute; 
            bottom: 0; left: 50%; 
            transform: translate(-50%, 100%); /* 使用位移彻底隐藏，不露边 */
            width: 90%; height: 40vh; 
            background: var(--panel-bg);
            border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none;
            border-radius: 20px 20px 0 0; padding: 40px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 105;
            overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.2vh;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.7);
        }
        body.show-details #details-panel { transform: translate(-50%, 0); }

        /* UI 元素微调 */
        .btn { 
            padding: 1vh 1.8vh; /* 缩小内边距 */
            background: rgba(70, 60, 50, 0.8); 
            color: var(--text-color); 
            border: 1px solid var(--accent-color); 
            border-radius: 4px; cursor: pointer; 
            font-size: 1.5vh; /* 调小字体 */
        }
        .btn:hover { background: var(--accent-color); color: #000; }
        .btn.active { background: var(--accent-color); color: #000; }
        
        select { 
            max-width: 35vw; /* 限制下拉框最大宽度 */
            background: #1a1a1a; color: var(--text-color); 
            border: 1px solid var(--accent-color); 
            padding: 8px; font-size: 1.5vh; 
            border-radius: 4px; 
        }
    </style>
</head>
<body>

    <div id="viewer" onclick="handleMainClick()"></div>

    <div id="navi-outer">
        <div id="navi-container"></div>
    </div>

    <div id="header-zone">
        <div id="art-title">作品加载中...</div>
    </div>

    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button class="btn" onclick="adjustSpeed(-0.00002)">慢速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        <button class="btn" onclick="adjustSpeed(0.00002)">快速</button>
        <button id="info-btn" class="btn" style="background:#4a3f35;" onclick="toggleDetails(event)">作品志</button>
        <button class="btn" style="background:var(--accent-color); color:#000; font-weight:bold;" onclick="handleMainClick()">继续</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()">
        <div id="full-desc"></div>
    </div>

    <script>
        var artworks = [
            {
                name: "01_张 同（清） 仿周之冕花卉卷",
                width: 21119, height: 1146,
                folder: "tiles/01_zhang_tong/",
                desc: "此卷为清代画家张同仿明代‘勾花点叶派’宗师周之冕之作。画面展现了四季花卉之生机，笔法清丽，设色典雅。此版本已针对43寸4K竖屏进行了UI优化，确保导览图全屏铺满，文字不再露边。"
            },
            {
                name: "02_新入藏作品", 
                width: 12867, height: 832,
                folder: "tiles/02_hua_tuo/", 
                desc: "12867像素长卷。导航图现已支持横向全屏显示，方便快速定位长卷位置。"
            }
        ];

        var viewer, scrollInterval, isPlaying = true, scrollStep = -0.00006;

        function initGallery() {
            const selector = document.getElementById('art-selector');
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
        }

        function loadArt(index) {
            let art = artworks[index];
            let centerY = (art.height / art.width) / 2;
            if (viewer) viewer.destroy();

            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder },
                canvasColor: '#221F1C',
                gestureSettingsMouse: { clickToZoom: false },
                showNavigationControl: false,
                showNavigator: true,
                navigatorId: "navi-container",
                navigatorAutoFade: false,
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                defaultZoomLevel: 1.0
            });

            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = art.name;
                document.getElementById('full-desc').innerText = art.desc;
                if (scrollInterval) clearInterval(scrollInterval);
                scrollInterval = setInterval(() => {
                    if (isPlaying) {
                        let cp = viewer.viewport.getCenter();
                        let nx = cp.x + scrollStep;
                        if (nx < -0.1) nx = 1.1; if (nx > 1.1) nx = -0.1;
                        viewer.viewport.panTo(new OpenSeadragon.Point(nx, centerY), true);
                    }
                }, 30);
            });
        }

        function handleMainClick() {
            if (document.body.classList.contains('show-details')) {
                document.body.classList.remove('show-details');
                document.getElementById('info-btn').classList.remove('active');
                return;
            }
            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
        }

        function toggleDetails(e) {
            e.stopPropagation();
            document.body.classList.toggle('show-details');
            document.getElementById('info-btn').classList.toggle('active');
        }

        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused', 'show-details'); loadArt(parseInt(val)); }
        function adjustSpeed(delta) { scrollStep = (Math.abs(scrollStep) + delta) * (scrollStep > 0 ? 1 : -1); }
        function reverseDir() { scrollStep = -scrollStep; }

        window.onload = initGallery;
    </script>
</body>
</html>
