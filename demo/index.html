<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 9.0 纯净高清版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        :root { 
            --bg-color: #221F1C; 
            --accent-color: #d4a017;
            --text-color: rgba(230, 210, 180, 0.8);
        }
        body { margin: 0; background: var(--bg-color); overflow: hidden; font-family: "STSong", "SimSun", serif; color: var(--text-color); cursor: none; }
        
        /* 核心展示区：去除模糊，仅保留亮度调节 */
        #viewer { 
            width: 100vw; height: 100vh; background: var(--bg-color); 
            filter: brightness(0.92) contrast(1.05) sepia(0.05); 
            transition: filter 0.5s; 
        }
        body.paused { cursor: default; }
        /* 关键修正：暂停时保持画面清晰，不使用 blur */
        body.paused #viewer { filter: brightness(0.6) contrast(1.05); }

        /* 顶部标题区：仅包含文字，支持滑入滑出 */
        #header-zone {
            position: absolute; top: -20vh; left: 0; width: 100%; height: 15vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            transition: top 0.5s ease; z-index: 100;
        }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 3.5vh; color: var(--accent-color); letter-spacing: 10px; font-weight: bold; }

        /* 导航图容器：独立出来，滚动时淡淡显示，暂停时高亮 */
        #navi-outer {
            position: absolute; top: 2vh; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 150;
            pointer-events: none; /* 播放时不干扰点击 */
        }
        #navi-container {
            width: 80%; height: 8vh; 
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 160, 23, 0.2);
            opacity: 0.4; /* 播放时半透明 */
            transition: all 0.5s;
        }
        /* 暂停时，导航图变清晰且可点击 */
        body.paused #navi-container {
            opacity: 1;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--accent-color);
            pointer-events: auto;
            transform: translateY(13vh); /* 暂停时向下移动一点，避开标题 */
        }

        /* 底部信息区 */
        #bottom-zone {
            position: absolute; bottom: -50vh; left: 0; width: 100%; height: 45vh;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 80%, transparent);
            display: flex; flex-direction: column; align-items: center;
            transition: bottom 0.5s ease; z-index: 100;
        }
        body.paused #bottom-zone { bottom: 0; }

        #description-box { width: 85%; flex-grow: 1; margin-top: 2vh; font-size: 2.2vh; line-height: 1.8; text-align: justify; overflow-y: auto; padding: 20px; }
        #controls { width: 100%; height: 10vh; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .btn { padding: 1vh 2vh; background: rgba(80, 70, 60, 0.8); color: var(--text-color); border: 1px solid var(--accent-color); border-radius: 4px; cursor: pointer; font-size: 1.6vh; }
        .btn:hover { background: var(--accent-color); color: #000; }
        select { background: #1a1a1a; color: var(--text-color); border: 1px solid var(--accent-color); padding: 8px; font-size: 1.6vh; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="viewer" onclick="toggleUI()"></div>

    <div id="navi-outer">
        <div id="navi-container"></div>
    </div>

    <div id="header-zone">
        <div id="art-title">作品加载中...</div>
    </div>

    <div id="bottom-zone">
        <div id="description-box">载入中...</div>
        <div id="controls">
            <select id="art-selector" onchange="switchArt(this.value)"></select>
            <button class="btn" onclick="adjustSpeed(-0.00002)">慢速</button>
            <button class="btn" onclick="reverseDir()">调向</button>
            <button class="btn" onclick="adjustSpeed(0.00002)">快速</button>
            <button class="btn" style="background:var(--accent-color); color:#000;" onclick="toggleUI()">继续播放</button>
        </div>
    </div>

    <script>
        var artworks = [
            {
                name: "01_张 同（清） 仿周之冕花卉卷",
                width: 21119, height: 1146,
                folder: "tiles/01_zhang_tong/",
                desc: "此卷为清代画家张同仿明代‘勾花点叶派’宗师周之冕之作。画面展现了四季花卉之生机，笔法清丽，设色典雅。"
            },
            {
                name: "02_新入藏作品", 
                width: 12867, height: 832,
                folder: "tiles/02_hua_tuo/", 
                desc: "12867像素长卷。现在导航地图（带红框全图）在滚动播放时会以半透明形式常驻上方，点击暂停后会自动移至标题下方并变亮。"
            }
        ];

        var viewer, scrollInterval, isPlaying = true, scrollStep = -0.00006;

        function initGallery() {
            const selector = document.getElementById('art-selector');
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
        }

        function loadArt(index) {
            let art = artworks[index];
            let centerY = (art.height / art.width) / 2;
            if (viewer) { viewer.destroy(); }

            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder },
                canvasColor: '#221F1C',
                gestureSettingsMouse: { clickToZoom: false },
                showNavigationControl: false,
                // 导航图核心设置
                showNavigator: true,
                navigatorId: "navi-container",
                navigatorAutoFade: false, // 强制不自动隐藏，由我们CSS控制
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                defaultZoomLevel: 1.0
            });

            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = art.name;
                document.getElementById('description-box').innerText = art.desc;
                if (scrollInterval) clearInterval(scrollInterval);
                scrollInterval = setInterval(() => {
                    if (isPlaying) {
                        let cp = viewer.viewport.getCenter();
                        let nx = cp.x + scrollStep;
                        if (nx < -0.1) nx = 1.1; if (nx > 1.1) nx = -0.1;
                        viewer.viewport.panTo(new OpenSeadragon.Point(nx, centerY), true);
                    }
                }, 30);
            });
        }

        function toggleUI() {
            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
        }

        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused'); loadArt(parseInt(val)); }
        function adjustSpeed(delta) { 
            let dir = scrollStep > 0 ? 1 : -1;
            scrollStep = (Math.abs(scrollStep) + delta) * dir;
        }
        function reverseDir() { scrollStep = -scrollStep; }

        window.onload = initGallery;
    </script>
</body>
</html>
