<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 76.5 最终典藏版 (仅记忆比例+右侧起跑)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #221F1C; --accent-color: #d4a017; --panel-bg: rgba(30, 25, 20, 0.98); --text-color: rgba(230, 210, 180, 0.9); }
        
        /* 完美的 Flexbox 垂直布局，构建坚如磐石的物理书桌 */
        html, body { 
            width: 100%; height: 100%; 
            background: var(--bg-color); overflow: hidden; 
            font-family: "STSong", "SimSun", serif; color: var(--text-color); cursor: none; 
            display: flex; flex-direction: column;
            transform-origin: center center;
            transition: transform 0.1s ease;
        }
        body.paused { cursor: default; }

        /* =========================================
           【顶层视窗】：承载上方 OSD 引擎（原导览图）
           ========================================= */
        #top-wrapper {
            width: 100%; 
            height: 30vh; 
            position: relative;
            flex-shrink: 0;
        }
        
        .gap { height: 15px; flex-shrink: 0; }

        /* =========================================
           【底层视窗】：承载下方 OSD 引擎（主图）
           ========================================= */
        #bottom-wrapper {
            width: 100%; 
            flex-grow: 1; 
            position: relative;
        }

        .osd-viewer { width: 100%; height: 100%; }

        /* 原生追踪红框 */
        #red-box {
            position: absolute;
            border: 2px solid rgba(255, 0, 0, 0.8);
            pointer-events: none; 
            z-index: 10;
        }

        #header-zone { position: absolute; top: -25vh; left: 0; width: 100%; height: 15vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); transition: top 0.4s ease; z-index: 100; padding: 0 5vw; pointer-events: none; }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 3.2vh; color: var(--accent-color); letter-spacing: 4px; font-weight: bold; text-align: center; }
        
        #control-bar { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: auto; min-height: 80px;
            padding: 20px 20px 30px 20px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px; 
            background: linear-gradient(to top, rgba(15,10,5,0.98) 40%, rgba(15,10,5,0.7) 80%, transparent); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), bottom 0.4s ease; 
            z-index: 200; 
            transform: translateY(100%); 
        }
        body.paused #control-bar { transform: translateY(0); }
        body.show-details #control-bar { bottom: 40vh; transform: translateY(0); background: transparent; }
        
        .btn { 
            padding: 1vh 1.8vh; 
            background: rgba(20, 15, 10, 0.4); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px); 
            color: rgba(255, 245, 230, 0.95); 
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9); 
            border: 1px solid rgba(212, 160, 23, 0.4); 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1.5vh; 
            transition: all 0.2s ease;
        }
        .btn:hover { background: var(--accent-color); color: #000; text-shadow: none; }
        
        select { max-width: 35vw; background: rgba(20, 15, 10, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: var(--text-color); border: 1px solid rgba(212, 160, 23, 0.4); padding: 8px; font-size: 1.5vh; border-radius: 6px; outline: none; transition: all 0.2s ease;}
        .btn.active-cycle { background: rgba(76,175,80,0.4); border-color: #4CAF50; color: #fff; box-shadow: 0 0 10px rgba(76,175,80,0.5); }

        #details-panel { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 120%); opacity: 0; pointer-events: none; width: 90%; height: 40vh; background: var(--panel-bg); border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; border-radius: 20px 20px 0 0; padding: 40px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; z-index: 205; overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.2vh; box-shadow: 0 -15px 40px rgba(0,0,0,0.7); }
        body.show-details #details-panel { transform: translate(-50%, 0); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="top-wrapper"><div id="top-viewer" class="osd-viewer"></div><div id="red-box"></div></div>
    <div class="gap"></div>
    <div id="bottom-wrapper"><div id="bottom-viewer" class="osd-viewer"></div></div>

    <div id="header-zone"><div id="art-title">加载中...</div></div>
    
    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button id="cycle-btn" class="btn" onclick="toggleAutoCycle()">自动轮播：关</button>
        <button class="btn" onclick="adjustSpeed(-0.000005)">减速</button>
        <button class="btn" onclick="adjustSpeed(0.000005)">加速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        <button class="btn" onclick="zoomTopViewer(1/1.08)">导览-</button>
        <button class="btn" onclick="zoomTopViewer(1.08)">导览+</button>
        <button class="btn" onclick="resetView()">全景</button>
        <button id="info-btn" class="btn" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" onclick="toggleFullscreen(event)">全屏</button>
        <button class="btn" style="color:var(--accent-color); font-weight:bold; border-color:var(--accent-color);" onclick="togglePlayState()">继续</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()"><div id="full-desc"></div></div>
