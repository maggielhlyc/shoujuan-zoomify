<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 沉浸式层级交互版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        :root { 
            --bg-color: #221F1C; 
            --accent-color: #d4a017;
            --panel-bg: rgba(34, 31, 28, 0.98);
            --text-color: rgba(230, 210, 180, 0.8);
        }
        body { margin: 0; background: var(--bg-color); overflow: hidden; font-family: "STSong", "SimSun", serif; color: var(--text-color); cursor: none; }
        #viewer { width: 100vw; height: 100vh; background: var(--bg-color); filter: brightness(0.92) contrast(1.05) sepia(0.05); transition: filter 0.6s ease; }
        body.paused { cursor: default; }
        body.paused #viewer { filter: brightness(0.5) blur(3px); }
        #header-zone { position: absolute; top: -25vh; left: 0; width: 100%; height: 20vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); transition: top 0.5s ease; z-index: 100; }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 4vh; color: var(--accent-color); letter-spacing: 12px; font-weight: bold; margin-bottom: 10px; }
        #control-bar { position: absolute; bottom: -15vh; left: 0; width: 100%; height: 12vh; display: flex; align-items: center; justify-content: center; gap: 25px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); transition: bottom 0.5s ease; z-index: 100; }
        body.paused #control-bar { bottom: 0; }
        #details-panel { position: absolute; bottom: -45vh; left: 50%; transform: translateX(-50%); width: 85%; height: 35vh; background: var(--panel-bg); border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; border-radius: 20px 20px 0 0; padding: 40px; transition: bottom 0.5s ease; z-index: 110; overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.4vh; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        body.show-details #details-panel { bottom: 0; }
        body.show-details #control-bar { bottom: 35vh; background: none; }
        .btn { padding: 12px 28px; background: rgba(80, 70, 60, 0.8); color: var(--text-color); border: 1px solid var(--accent-color); border-radius: 6px; cursor: pointer; font-size: 1.8vh; transition: 0.3s; }
        .btn:hover { background: var(--accent-color); color: #000; }
        .btn.active { background: var(--accent-color); color: #000; }
        select { background: #1a1a1a; color: var(--text-color); border: 1px solid var(--accent-color); padding: 10px; font-size: 1.8vh; border-radius: 6px; }
        #progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.05); z-index: 120; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-color); }
    </style>
</head>
<body>
    <div id="viewer" onclick="handleMainClick()"></div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="header-zone">
        <div id="art-title">加载中...</div>
        <div style="font-size: 2vh; opacity: 0.5; letter-spacing: 4px;">PRIVATE DIGITAL MUSEUM</div>
    </div>
    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button class="btn" onclick="adjustSpeed(-0.00002)">减速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        <button class="btn" onclick="adjustSpeed(0.00002)">加速</button>
        <button id="info-btn" class="btn" style="background:#4a3f35;" onclick="toggleDetails(event)">作品志</button>
        <button class="btn" style="background:var(--accent-color); color:#000;" onclick="handleMainClick()">继续</button>
    </div>
    <div id="details-panel" onclick="event.stopPropagation()"><div id="full-desc"></div></div>

    <script>
        // --- 策展清单：使用了反引号 ` 来包裹说明文字，允许换行且不容易报错 ---
        var artworks = [
            {
                name: "01_张 同（清） 仿周之冕花卉卷",
                meta: "清代 · 纸本设色",
                width: 21119, height: 1146,
                folder: "tiles/01_zhangtong/",
                desc: `手卷 设色纸本
ZHANG TONG FLOWERS AFTER ZHOU ZHIMIAN
hand scroll; ink and color on paper
引首：28×101 cm. 11×39 3/4 in. 约2.5平尺，
画心：28×475 cm. 11×187 in. 约12.0平尺
题签：著手成春。天江钦题。钤印：江马圣钦、碧梧馆
题识：仿周之冕笔意，松隐张同。
钤印：张同、揆一
说明：江马天江（1825-1901），日本人。本名下坂圣钦，号天江。德川末期勤王诗人。擅长诗、书、画、鉴定。日本中国古书画鉴定权威。
张同，字揆一，号松隐，江苏昆山人。与倪永清友善。善花鸟，有自怡草。`
            },
            {
                name: "02_新入藏作品",
                meta: "清代 · 纸本手卷",
                width: 12867, height: 832,
                folder: "tiles/02_Hua Tuo/", 
                desc: `作者华拓
作者生卒b.1940
形式手卷 设色纸本
尺寸引首: 22.5 x 63 cm. 8 7/8 x 24 3/4 in. 约1.3平尺;画: 22.5 x 316 cm. 8 7/8 x 124 3/8 in. 约6.4平尺
创作年代1987年作
题识:一九八四年夏访青海，于祁连县得稿，八七年绘于南京，华拓并记。
钤印:华拓
宋文治（1919-1999）题签条：华拓祁连山长卷。文治。 钤印：文治
宋文治题引首：祁连胜览。癸酉三月，题华拓弟山水卷。文治。 钤印：娄江宋灏、文治书印、九十年代
`
            }
        ];

        var viewer, scrollInterval, isPlaying = true, scrollStep = -0.00006;

        function initGallery() {
            const selector = document.getElementById('art-selector');
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
        }

        function loadArt(index) {
            let art = artworks[index];
            let centerY = (art.height / art.width) / 2;
            let baseUrl = "https://maggielhlyc.github.io/shoujuan-zoomify/";
            if (viewer) viewer.destroy();
            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: baseUrl + art.folder },
                canvasColor: '#221F1C', gestureSettingsMouse: { clickToZoom: false },
                visibilityRatio: 1.0, constrainDuringPan: true, showNavigationControl: false, defaultZoomLevel: 1.0
            });
            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = art.name;
                document.getElementById('full-desc').innerText = art.desc;
                if (scrollInterval) clearInterval(scrollInterval);
                scrollInterval = setInterval(() => {
                    if (isPlaying) {
                        let cp = viewer.viewport.getCenter();
                        let nx = cp.x + scrollStep;
                        if (nx < -0.1) nx = 1.1; if (nx > 1.1) nx = -0.1;
                        viewer.viewport.panTo(new OpenSeadragon.Point(nx, centerY), true);
                        document.getElementById('progress-bar').style.width = (((nx + 0.1) / 1.2) * 100) + "%";
                    }
                }, 30);
            });
        }

        function handleMainClick() {
            if (document.body.classList.contains('show-details')) {
                document.body.classList.remove('show-details');
                document.getElementById('info-btn').classList.remove('active');
                return;
            }
            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
        }

        function toggleDetails(e) {
            e.stopPropagation();
            document.body.classList.toggle('show-details');
            document.getElementById('info-btn').classList.toggle('active');
        }

        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused', 'show-details'); loadArt(parseInt(val)); }
        function adjustSpeed(delta) { scrollStep = (Math.abs(scrollStep) + delta) * (scrollStep > 0 ? 1 : -1); }
        function reverseDir() { scrollStep = -scrollStep; }
        window.addEventListener('keydown', (e) => { if(e.code === "Space") handleMainClick(); });
        window.onload = initGallery;
    </script>
</body>
</html>
