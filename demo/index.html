<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 40.0 智能防遮挡定稿版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #221F1C; --accent-color: #d4a017; --panel-bg: rgba(30, 25, 20, 0.98); --text-color: rgba(230, 210, 180, 0.9); }
        html, body { width: 100%; height: 100%; background: var(--bg-color); overflow: hidden; font-family: "STSong", "SimSun", serif; color: var(--text-color); cursor: none; }
        
        #viewer { width: 100vw; height: 100vh; background: var(--bg-color); filter: contrast(1.05) sepia(0.04); }
        body.paused { cursor: default; }

        #navi-outer { position: absolute; left: 0; width: 100vw; display: flex; justify-content: center; align-items: flex-end; z-index: 150; pointer-events: none; opacity: 0.6; transition: opacity 0.4s; transform: translateY(-100%); }
        #navi-mover { transition: transform 0.1s linear; }
        #navi-container { background: var(--bg-color); border-top: 1px solid rgba(212, 160, 23, 0.2); border-bottom: 1px solid rgba(212, 160, 23, 0.2); }
        
        body.paused #navi-outer { opacity: 1; pointer-events: auto; }
        body.paused #navi-container { border-color: var(--accent-color); box-shadow: 0 0 20px rgba(212, 160, 23, 0.35); }

        #header-zone { position: absolute; top: -25vh; left: 0; width: 100%; height: 15vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); transition: top 0.4s ease; z-index: 100; padding: 0 5vw; pointer-events: none; }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 3.2vh; color: var(--accent-color); letter-spacing: 4px; font-weight: bold; text-align: center; }
        
        /* ==========================================
           【核心 CSS 升级】：全自动高度自适应控制栏
           ========================================== */
        #control-bar { 
            position: absolute; 
            bottom: 0; /* 死死贴住屏幕底边 */
            left: 0; 
            width: 100%; 
            height: auto; /* 放弃固定高度，让按钮行数自动撑开 */
            min-height: 80px;
            padding: 20px 20px 30px 20px; /* 底部预留安全距离 */
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            background: linear-gradient(to top, rgba(15,10,5,0.98) 40%, rgba(15,10,5,0.7) 80%, transparent); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), bottom 0.4s ease; 
            z-index: 110; 
            /* 播放状态时，向下移动 100% 自己的高度完美隐藏 */
            transform: translateY(100%); 
        }
        /* 暂停时，瞬间平滑弹回原位 */
        body.paused #control-bar { transform: translateY(0); }
        
        body.show-details #control-bar { bottom: 40vh; transform: translateY(0); background: transparent; }
        
        #details-panel { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 100%); width: 90%; height: 40vh; background: var(--panel-bg); border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; border-radius: 20px 20px 0 0; padding: 40px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 105; overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.2vh; box-shadow: 0 -15px 40px rgba(0,0,0,0.7); }
        body.show-details #details-panel { transform: translate(-50%, 0); }
        
        .btn { padding: 1vh 1.8vh; background: rgba(70, 60, 50, 0.8); color: var(--text-color); border: 1px solid var(--accent-color); border-radius: 4px; cursor: pointer; font-size: 1.5vh; }
        .btn:hover { background: var(--accent-color); color: #000; }
        select { max-width: 35vw; background: #1a1a1a; color: var(--text-color); border: 1px solid var(--accent-color); padding: 8px; font-size: 1.5vh; border-radius: 4px; outline: none;}
        .btn.active-cycle { background: #2d4a35; border-color: #4CAF50; color: #fff; box-shadow: 0 0 10px rgba(76,175,80,0.5); }
    </style>
</head>
<body>

    <div id="viewer"></div>
    <div id="navi-outer"></div> 
    
    <div id="header-zone"><div id="art-title">加载中...</div></div>
    
    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button id="cycle-btn" class="btn" onclick="toggleAutoCycle()">自动轮播：关</button>
        <button class="btn" onclick="adjustSpeed(-0.000005)">减速</button>
        <button class="btn" onclick="adjustSpeed(0.000005)">加速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        
        <button class="btn" style="background:#5a3f35;" onclick="zoomNavi(-0.1)">导览-</button>
        <button class="btn" style="background:#5a3f35;" onclick="zoomNavi(0.1)">导览+</button>
        
        <button class="btn" onclick="resetView()">全景</button>
        <button id="info-btn" class="btn" style="background:#4a3f35;" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" style="background:#2d4a35;" onclick="toggleFullscreen(event)">全屏</button>
        <button class="btn" style="background:var(--accent-color); color:#000; font-weight:bold;" onclick="togglePlayState()">继续</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()"><div id="full-desc"></div></div>

    <script>
        // 【⚠️】请务必保留反引号与逗号，粘贴您的真实介绍！
        var artworks = [
            { 
                name: "01_张 同（清） 仿周之冕花卉卷", 
                width: 21119, height: 1146, folder: "tiles/01_zhang_tong/", 
                desc: `文字一` 
            },
            { 
                name: "02_华拓 祁连山卷-全卷", 
                width: 12867, height: 832, folder: "tiles/02_hua_tuo/", 
                desc: `文字二` 
            },
            { 
                name: "03_金楙 秋岩爽气卷", 
                width: 5546, height: 582, folder: "tiles/03_jin_mao/", 
                desc: `文字三` 
            },
            { 
                name: "04_清明上河图 (宋本 10段无缝拼接)", 
                width: 395409, 
                height: 7595, 
                desc: `这是由10段独立扫描件在代码中无缝拼接而成的超长手卷。`,
                folder: [
                    // 从最左侧开始（X=0），一路向右拼接
                    { tileSource: { type: 'zoomifytileservice', width: 43276, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_a/" }, x: 0, y: 0, width: 43276 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_b/" }, x: 43276, y: 0, width: 50000 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 38778, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_c/" }, x: 93276, y: 0, width: 38778 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_d/" }, x: 132054, y: 0, width: 50000 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 2863, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_e/" }, x: 182054, y: 0, width: 2863 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_f/" }, x: 184917, y: 0, width: 50000 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_g/" }, x: 234917, y: 0, width: 50000 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 10492, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_h/" }, x: 284917, y: 0, width: 10492 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_i/" }, x: 295409, y: 0, width: 50000 },
                    
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_j/" }, x: 345409, y: 0, width: 50000 }
                ]
            }
         ]; 
        var viewer, animationRequest, scrollStep = -0.00003, isPlaying = true, centerY = 0;
        var currentArtIndex = 0;
        var isAutoCycle = false;

        var baseNaviWidth = 0;
        var baseNaviHeight = 0;
        var naviScale = 1.0;

        function initGallery() {
            const selector = document.getElementById('art-selector');
            selector.innerHTML = ""; 
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
            
            // 全局监听屏幕翻转或调整大小，动态重算高度
            window.addEventListener('resize', handleSmartResize);
        }

        function loadArt(index) {
            currentArtIndex = index;
            let art = artworks[index];
            
            if (animationRequest) cancelAnimationFrame(animationRequest);
            if (viewer) { viewer.destroy(); viewer = null; }

            const outer = document.getElementById('navi-outer');
            
            let ratio = art.width / art.height;
            baseNaviHeight = window.innerWidth / ratio;
            let maxHeight = window.innerHeight * 0.15; 
            
            if (baseNaviHeight > maxHeight) {
                baseNaviHeight = maxHeight;
                baseNaviWidth = baseNaviHeight * ratio;
            } else {
                baseNaviWidth = window.innerWidth;
            }
            naviScale = 1.0; 
            
            outer.innerHTML = '<div id="navi-mover"><div id="navi-container" style="width: ' + baseNaviWidth + 'px; height: ' + baseNaviHeight + 'px;"></div></div>';

            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: Array.isArray(art.folder) ? art.folder : { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder },
                canvasColor: '#221F1C',
                showNavigationControl: false,
                showNavigator: true,
                navigatorId: "navi-container",
                navigatorAutoFade: false,
                gestureSettingsMouse: { clickToZoom: false, dblClickToZoom: false }, 
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                defaultZoomLevel: 1.0,
                animationTime: 0,
                blendingTime: 0.1
            });

            viewer.addHandler('canvas-click', function(event) {
                if (!event.quick) return; 
                event.preventDefaultAction = true; 
                togglePlayState();
            });

            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = art.name;
                document.getElementById('full-desc').innerText = art.desc;
                document.getElementById('art-selector').value = index;

                applyInitialLayout();

                setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 100);

                startAnimationLoop();
            });
        }

        // ==========================================
        // 【核心 JS 升级】：智能动态测距算法
        // ==========================================
        function applyInitialLayout() {
            let art = artworks[currentArtIndex];
            let dpr = window.devicePixelRatio || 1;
            let nativeZoom = viewer.viewport.imageToViewportZoom(1.0) / dpr;
            
            viewer.viewport.fitVertically(true);
            let fitZoom = viewer.viewport.getZoom(true);
            
            let finalZoom = Math.min(nativeZoom, fitZoom);
            viewer.viewport.zoomTo(finalZoom, null, true);

            let imgRatio = art.height / art.width; 
            let vpHeight = viewer.viewport.getBounds().height; 
            
            // 1. 动态获取控制栏在当前屏幕下（无论几行）的真实物理高度
            let cbHeight = document.getElementById('control-bar').offsetHeight;
            
            // 2. 真实高度 + 15像素的呼吸留白，作为绝对安全距离
            let bottomGapPx = cbHeight + 15; 
            let gapWorld = (bottomGapPx / window.innerHeight) * vpHeight;

            if (vpHeight > imgRatio) {
                // 将画卷精准停靠在控制栏正上方
                centerY = imgRatio + gapWorld - (vpHeight / 2);
            } else {
                centerY = imgRatio / 2;
            }
            
            let vpWidth = viewer.viewport.getBounds().width;
            let startX = 1.0 - (vpWidth / 2); 
            viewer.viewport.panTo(new OpenSeadragon.Point(startX, centerY), true);
        }

        // 监听屏幕翻转，实时保护画卷不被遮挡
        function handleSmartResize() {
            if (!viewer || !viewer.viewport) return;
            
            let art = artworks[currentArtIndex];
            let imgRatio = art.height / art.width;
            let vpHeight = viewer.viewport.getBounds().height;

            let cbHeight = document.getElementById('control-bar').offsetHeight;
            let bottomGapPx = cbHeight + 15;
            let gapWorld = (bottomGapPx / window.innerHeight) * vpHeight;

            if (vpHeight > imgRatio) {
                centerY = imgRatio + gapWorld - (vpHeight / 2);
            } else {
                centerY = imgRatio / 2;
            }

            // 只调整高度（防遮挡），不改变用户当前观看的水平进度
            let currentX = viewer.viewport.getCenter().x;
            viewer.viewport.panTo(new OpenSeadragon.Point(currentX, centerY), true);
        }

        function zoomNavi(delta) {
            naviScale += delta;
            if (naviScale < 1) naviScale = 1; 
            if (naviScale > 10) naviScale = 10; 
            
            const naviContainer = document.getElementById('navi-container');
            if(naviContainer) {
                naviContainer.style.width = (baseNaviWidth * naviScale) + 'px';
                naviContainer.style.height = (baseNaviHeight * naviScale) + 'px';
            }
            
            if (viewer && viewer.navigator) {
                viewer.navigator.updateSize();
                viewer.navigator.viewport.goHome(true); 
            }
            
            updateNaviPosition(); 
        }

        function startAnimationLoop() {
            function step() {
                if (isPlaying && viewer && viewer.viewport) {
                    let currentPos = viewer.viewport.getCenter();
                    let newX = currentPos.x + scrollStep;
                    
                    let vpWidth = viewer.viewport.getBounds().width;
                    let leftLimit = vpWidth / 2;

                    if (newX < leftLimit) {
                        if (isAutoCycle) {
                            let nextIndex = (currentArtIndex + 1) % artworks.length;
                            loadArt(nextIndex);
                            return; 
                        } else {
                            newX = 1.1; 
                        }
                    }
                    if (newX > 1.1) newX = -0.1;
                    
                    viewer.viewport.panTo(new OpenSeadragon.Point(newX, currentPos.y), true);
                }
                updateNaviPosition();
                animationRequest = requestAnimationFrame(step);
            }
            animationRequest = requestAnimationFrame(step);
        }

        function toggleAutoCycle() {
            isAutoCycle = !isAutoCycle;
            const btn = document.getElementById('cycle-btn');
            if (isAutoCycle) {
                btn.innerText = "自动轮播：开";
                btn.classList.add('active-cycle');
            } else {
                btn.innerText = "自动轮播：关";
                btn.classList.remove('active-cycle');
            }
        }

        function updateNaviPosition() {
            if (!viewer || !viewer.viewport || viewer.world.getItemCount() === 0) return;
            const naviOuter = document.getElementById('navi-outer');
            const naviMover = document.getElementById('navi-mover');
            if (!naviOuter || !naviMover) return;
            
            const imageBounds = viewer.world.getHomeBounds();
            const mainCenter = viewer.viewport.getCenter(true); 
            
            let p = mainCenter.x / imageBounds.width;
            p = Math.max(0, Math.min(1, p));
            
            let translate_X = baseNaviWidth * (p - 0.5) * (1 - naviScale);
            naviMover.style.transform = `translateX(${translate_X}px)`;

            const pixelTopLeft = viewer.viewport.viewportToViewerElementCoordinates(imageBounds.getTopLeft());
            naviOuter.style.top = (pixelTopLeft.y - 30) + "px";
        }

        function togglePlayState() {
            if (document.body.classList.contains('show-details')) {
                document.body.classList.remove('show-details');
                return;
            }
            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
        }

        function resetView() {
            if (viewer) {
                applyInitialLayout();
                isPlaying = true;
                document.body.classList.remove('paused', 'show-details');
            }
        }

        function toggleFullscreen(e) {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if(document.exitFullscreen) document.exitFullscreen();
            }
        }

        function toggleDetails(e) { e.stopPropagation(); document.body.classList.toggle('show-details'); }
        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused', 'show-details'); loadArt(parseInt(val)); }
        function adjustSpeed(delta) { let dir = scrollStep > 0 ? 1 : -1; scrollStep = (Math.abs(scrollStep) + delta) * dir; scrollStep = Math.max(0.000005, Math.min(0.0002, Math.abs(scrollStep))) * dir; }
        function reverseDir() { scrollStep = -scrollStep; }

        if ('serviceWorker' in navigator) { window.addEventListener('load', function() { navigator.serviceWorker.register('sw.js').catch(err=>{}); }); }
        window.onload = initGallery;
    </script>
</body>
</html>
