<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 72.0 终极同步生长版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #221F1C; --accent-color: #d4a017; --panel-bg: rgba(30, 25, 20, 0.98); --text-color: rgba(230, 210, 180, 0.9); }
        html, body { width: 100%; height: 100%; background: var(--bg-color); overflow: hidden; font-family: "STSong", "SimSun", serif; color: var(--text-color); cursor: none; }
        
        #viewer { width: 100vw; height: 100vh; background: var(--bg-color); filter: contrast(1.05) sepia(0.04); }
        body.paused { cursor: default; }

        #navi-outer { 
            position: absolute; 
            left: 0; 
            width: 100vw; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            z-index: 150; 
            pointer-events: none; 
            opacity: 1; 
        }
        
        /* 删除了 CSS transition，高度变化交由 JS 帧动画精确接管 */
        #navi-container { 
            position: relative;
            background: var(--bg-color); 
            pointer-events: auto; 
            touch-action: none; 
        }
        
        #navi-viewer { width: 100%; height: 100%; cursor: ns-resize; }
        
        #navi-redbox {
            position: absolute;
            border: 2px solid rgba(255, 0, 0, 0.8);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3); 
            pointer-events: none; 
            z-index: 10;
        }

        #header-zone { position: absolute; top: -25vh; left: 0; width: 100%; height: 15vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); transition: top 0.4s ease; z-index: 100; padding: 0 5vw; pointer-events: none; }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 3.2vh; color: var(--accent-color); letter-spacing: 4px; font-weight: bold; text-align: center; }
        
        #control-bar { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: auto; min-height: 80px;
            padding: 20px 20px 30px 20px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px; 
            background: linear-gradient(to top, rgba(15,10,5,0.98) 40%, rgba(15,10,5,0.7) 80%, transparent); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), bottom 0.4s ease; 
            z-index: 200; 
            transform: translateY(100%); 
        }
        body.paused #control-bar { transform: translateY(0); }
        body.show-details #control-bar { bottom: 40vh; transform: translateY(0); background: transparent; }
        
        #details-panel { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 100%); width: 90%; height: 40vh; background: var(--panel-bg); border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; border-radius: 20px 20px 0 0; padding: 40px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 205; overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.2vh; box-shadow: 0 -15px 40px rgba(0,0,0,0.7); }
        body.show-details #details-panel { transform: translate(-50%, 0); }
        
        .btn { padding: 1vh 1.8vh; background: rgba(70, 60, 50, 0.8); color: var(--text-color); border: 1px solid var(--accent-color); border-radius: 4px; cursor: pointer; font-size: 1.5vh; }
        .btn:hover { background: var(--accent-color); color: #000; }
        select { max-width: 35vw; background: #1a1a1a; color: var(--text-color); border: 1px solid var(--accent-color); padding: 8px; font-size: 1.5vh; border-radius: 4px; outline: none;}
        .btn.active-cycle { background: #2d4a35; border-color: #4CAF50; color: #fff; box-shadow: 0 0 10px rgba(76,175,80,0.5); }
    </style>
</head>
<body>

    <div id="viewer"></div>
    <div id="navi-outer">
        <div id="navi-container">
            <div id="navi-viewer"></div>
            <div id="navi-redbox"></div>
        </div>
    </div> 
    <div id="header-zone"><div id="art-title">加载中...</div></div>
    
    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button id="cycle-btn" class="btn" onclick="toggleAutoCycle()">自动轮播：关</button>
        <button class="btn" onclick="adjustSpeed(-0.000005)">减速</button>
        <button class="btn" onclick="adjustSpeed(0.000005)">加速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        
        <button class="btn" style="background:#5a3f35;" onclick="zoomNavi(-0.25)">导览-</button>
        <button class="btn" style="background:#5a3f35;" onclick="zoomNavi(0.25)">导览+</button>
        
        <button class="btn" onclick="resetView()">全景</button>
        <button id="info-btn" class="btn" style="background:#4a3f35;" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" style="background:#2d4a35;" onclick="toggleFullscreen(event)">全屏</button>
        <button class="btn" style="background:var(--accent-color); color:#000; font-weight:bold;" onclick="togglePlayState()">继续</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()"><div id="full-desc"></div></div>

    <script>
        var artworks = [
            { name: "01_张 同（清） 仿周之冕花卉卷", width: 21119, height: 1146, folder: "tiles/01_zhang_tong/", desc: `文字一` },
            { name: "02_华拓 祁连山卷-全卷", width: 12867, height: 832, folder: "tiles/02_hua_tuo/", desc: `文字二` },
            { name: "03_金楙 秋岩爽气卷", width: 5546, height: 582, folder: "tiles/03_jin_mao/", desc: `文字三` },
            { 
                name: "04_清明上河图 (宋本 10段无缝拼接)", 
                width: 395409, height: 7595, desc: `文字四`,
                folder: [
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_a/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_b/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 10492, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_c/" }, width: 10492 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_d/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_e/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 2863, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_f/" }, width: 2863 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_g/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 38778, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_h/" }, width: 38778 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_i/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 43276, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_j/" }, width: 43276 }
                ]
            },
           { name: "05_清明上河图", width: 182108, height: 7595, folder: "tiles/05_qingmingshanghetu_song-huaxin/", desc: `文字三` }
        ];

        var viewer, naviViewer, animationRequest, scrollStep = -0.00003, isPlaying = true, centerY = 0;
        var currentArtIndex = 0, isAutoCycle = false;
        
        // 核心伸涨控制组
        var baseNaviWidth = 0, baseNaviHeight = 0;
        var targetNaviScale = 1.0, currentNaviScale = 1.0; 

        function initGallery() {
            const selector = document.getElementById('art-selector');
            selector.innerHTML = ""; 
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
            window.addEventListener('resize', handleSmartResize);

            // 完美分发：鼠标悬停在导览图时，放飞导览图
            window.addEventListener('wheel', function(e) {
                const naviContainer = document.getElementById('navi-container');
                if (naviContainer && naviContainer.contains(e.target)) {
                    if (isPlaying) return;
                    e.preventDefault();
                    e.stopImmediatePropagation(); 
                    let zoomDirection = 0;
                    if (e.deltaY !== undefined) zoomDirection = e.deltaY < 0 ? 0.25 : -0.25;
                    if (zoomDirection !== 0) zoomNavi(zoomDirection);
                }
            }, { capture: true, passive: false });

            let initialPinchDistance = null;
            window.addEventListener('touchstart', function(e) {
                if(e.touches.length === 2) {
                    const naviContainer = document.getElementById('navi-container');
                    if (naviContainer && naviContainer.contains(e.touches[0].target)) {
                        if(isPlaying) return;
                        e.preventDefault();
                        e.stopImmediatePropagation();
                        initialPinchDistance = Math.hypot(
                            e.touches[0].pageX - e.touches[1].pageX,
                            e.touches[0].pageY - e.touches[1].pageY
                        );
                    }
                }
            }, { capture: true, passive: false });

            window.addEventListener('touchmove', function(e) {
                if(e.touches.length === 2 && initialPinchDistance !== null) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    let currentDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    let delta = (currentDistance - initialPinchDistance) * 0.01; 
                    zoomNavi(delta);
                    initialPinchDistance = currentDistance;
                }
            }, { capture: true, passive: false });

            window.addEventListener('touchend', function(e) { initialPinchDistance = null; }, { capture: true, passive: false });
        }

        function loadArt(index) {
            currentArtIndex = index;
            let art = artworks[index];
            
            // 1. 掐灭一切旧残影
            if (animationRequest) { cancelAnimationFrame(animationRequest); animationRequest = null; }
            
            // 2. 彻底毁灭旧引擎，绝不再犯“复用黑屏”的错
            if (viewer) { viewer.destroy(); viewer = null; }
            if (naviViewer) { naviViewer.destroy(); naviViewer = null; }

            // 3. 掘地三尺重铸 DOM
            document.getElementById('viewer').innerHTML = '';
            document.getElementById('navi-outer').innerHTML = `
                <div id="navi-container">
                    <div id="navi-viewer"></div>
                    <div id="navi-redbox"></div>
                </div>
            `;

            // 4. 重置伸缩比例
            targetNaviScale = 1.0;
            currentNaviScale = 1.0;
            window.naviBaseZoom = undefined; 

            let ratio = art.width / art.height;
            baseNaviWidth = window.innerWidth;
            baseNaviHeight = baseNaviWidth / ratio;

            let maxHeight = window.innerHeight * 0.15; 
            if (baseNaviHeight > maxHeight) {
                baseNaviHeight = maxHeight;
                baseNaviWidth = baseNaviHeight * ratio; 
            }

            const naviContainer = document.getElementById('navi-container');
            naviContainer.style.width = baseNaviWidth + 'px';
            naviContainer.style.height = baseNaviHeight + 'px';

            let finalTileSources;
            if (Array.isArray(art.folder)) {
                let currentAccumulatedX = 0;
                finalTileSources = art.folder.map(function(item) {
                    let config = {
                        tileSource: item.tileSource,
                        x: currentAccumulatedX / art.width, y: 0, width: item.width / art.width
                    };
                    currentAccumulatedX += item.width;          
                    return config;
                });
            } else {
                finalTileSources = { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder };
            }

            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: finalTileSources, 
                canvasColor: '#221F1C',
                showNavigationControl: false,
                showNavigator: false, 
                gestureSettingsMouse: { clickToZoom: false, dblClickToZoom: false }, 
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                animationTime: 0.4,       
                zoomPerScroll: 1.1,       
                blendingTime: 0.1
            });

            naviViewer = OpenSeadragon({
                id: "navi-viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: finalTileSources, 
                canvasColor: 'transparent',
                showNavigationControl: false,
                showNavigator: false,
                gestureSettingsMouse: { clickToZoom: false, dblClickToZoom: false }, 
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                animationTime: 0.2,       
                zoomPerScroll: 1.3,  
                blendingTime: 0.1
            });

            viewer.addHandler('canvas-click', function(event) {
                if (!event.quick) return; 
                event.preventDefaultAction = true; 
                togglePlayState();
            });

            // 导览图点击跳转功能
            naviViewer.addHandler('canvas-click', function(event) {
                if (event.quick) {
                    event.preventDefaultAction = true; 
                    let pt = naviViewer.viewport.pointFromPixel(event.position);
                    let currentY = viewer.viewport.getCenter().y;
                    viewer.viewport.panTo(new OpenSeadragon.Point(pt.x, currentY));
                }
            });

            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = artworks[currentArtIndex].name;
                document.getElementById('full-desc').innerText = artworks[currentArtIndex].desc;
                document.getElementById('art-selector').value = currentArtIndex;
                applyInitialLayout();
                startAnimationLoop(); // 无条件开启引擎心跳
            });
        }

        // ========================================================
        // 【核心红框贴合】
        // ========================================================
        function syncRedBox() {
            if (!viewer || !naviViewer || !viewer.viewport || !naviViewer.viewport) return;
            try {
                // 横向同步：强制镜头的中心跟着主图走
                let mainCenter = viewer.viewport.getCenter(true);
                let naviHomeBounds = naviViewer.viewport.getHomeBounds();
                if(naviHomeBounds) {
                    let naviCenterY = naviHomeBounds.getCenter().y;
                    naviViewer.viewport.panTo(new OpenSeadragon.Point(mainCenter.x, naviCenterY), true); 
                }

                // 红框描绘
                let bounds = viewer.viewport.getBounds(true);
                let tl = naviViewer.viewport.pixelFromPoint(bounds.getTopLeft(), true);
                let br = naviViewer.viewport.pixelFromPoint(bounds.getBottomRight(), true);
                
                let box = document.getElementById('navi-redbox');
                if (box) {
                    box.style.left = tl.x + 'px';
                    box.style.width = (br.x - tl.x) + 'px';
                    // 物理死命令：上下贴边，再也不许漂移！
                    box.style.top = '0px';
                    box.style.height = '100%';
                }
            } catch(e) {}
        }

        function applyInitialLayout() {
            let art = artworks[currentArtIndex];
            let container = viewer.viewport.getContainerSize();
            let dpr = window.devicePixelRatio || 1;
            let nativeZoom = (art.width / dpr) / container.x;
            let imgRatio = art.height / art.width; 
            
            let fitZoom = (container.y * 0.5 / container.x) / imgRatio; 
            let finalZoom = Math.min(nativeZoom, fitZoom);
            viewer.viewport.zoomTo(finalZoom, null, true);
            
            if(naviViewer && naviViewer.viewport) {
                naviViewer.viewport.goHome(true);
                // 记住导览图的初始基准倍率，为后续精确放大做铺垫
                window.naviBaseZoom = naviViewer.viewport.getHomeZoom();
            }
        }

        function handleSmartResize() {
            if (!viewer || !viewer.viewport) return;
            applyInitialLayout(); 
        }

        function zoomNavi(delta) {
            let multiplier = delta > 0 ? 1.25 : (1/1.25);
            let nextScale = targetNaviScale * multiplier;
            
            if (nextScale < 1.0) nextScale = 1.0;
            if (nextScale > 15.0) nextScale = 15.0; // 放大上限
            
            targetNaviScale = nextScale;
        }

        // ========================================================
        // 【终极重组：JS 混合插值动画引擎】
        // 彻底解决 OSD 异步裁切导致的“窄条”现象
        // ========================================================
        function startAnimationLoop() {
            function step() {
                if (viewer && viewer.viewport) {
                    // --- 1. 处理主画卷的自动巡航 ---
                    let currentPos = viewer.viewport.getCenter();
                    let newX = currentPos.x;

                    if (isPlaying) {
                        newX += scrollStep;
                        let vpWidth = viewer.viewport.getBounds().width;
                        let leftLimit = vpWidth / 2;
                        if (newX < leftLimit) {
                            if (isAutoCycle) { loadArt((currentArtIndex + 1) % artworks.length); return; } 
                            else { newX = 1.1; }
                        }
                        if (newX > 1.1) newX = -0.1;
                    }

                    // --- 2. 主画卷的物理堆叠（向上生长）---
                    let art = artworks[currentArtIndex];
                    let imgRatio = art.height / art.width;
                    let containerSize = viewer.viewport.getContainerSize();
                    let currentZoom = viewer.viewport.getZoom();
                    let targetVpHeight = (containerSize.y / containerSize.x) / currentZoom;
                    
                    let cbHeight = document.getElementById('control-bar').offsetHeight || 80;
                    let bottomGap = 10; 
                    let offsetWorld = ((cbHeight + bottomGap) / containerSize.y) * targetVpHeight;
                    
                    let newY = imgRatio + offsetWorld - (targetVpHeight / 2);
                    viewer.viewport.panTo(new OpenSeadragon.Point(newX, newY), true);

                    // --- 3. 导览图物理容器悬浮跟上 ---
                    let topPixel = viewer.viewport.pixelFromPoint(new OpenSeadragon.Point(0, 0), true);
                    const naviOuter = document.getElementById('navi-outer');
                    if (naviOuter) {
                        let naviGap = 15; 
                        let bottomPos = window.innerHeight - topPixel.y + naviGap;
                        naviOuter.style.bottom = bottomPos + "px";
                    }

                    // --- 4. 【核心】：高度与图像放大的 100% 帧同步 ---
                    if (Math.abs(targetNaviScale - currentNaviScale) > 0.001) {
                        // 利用缓动插值，实现丝滑长高
                        currentNaviScale += (targetNaviScale - currentNaviScale) * 0.15;
                        
                        const naviContainer = document.getElementById('navi-container');
                        if (naviContainer && naviViewer && naviViewer.viewport && window.naviBaseZoom) {
                            // a) 盒子长高一毫米
                            naviContainer.style.height = (baseNaviHeight * currentNaviScale) + 'px';
                            // b) OSD 立刻感知新盒子
                            naviViewer.updateSize();
                            // c) 图像精准放大填充新盒子，杜绝切割！
                            naviViewer.viewport.zoomTo(window.naviBaseZoom * currentNaviScale, null, true);
                        }
                    }

                    syncRedBox();
                }
                animationRequest = requestAnimationFrame(step);
            }
            animationRequest = requestAnimationFrame(step);
        }

        function toggleAutoCycle() {
            isAutoCycle = !isAutoCycle;
            const btn = document.getElementById('cycle-btn');
            if (isAutoCycle) {
                btn.innerText = "自动轮播：开";
                btn.classList.add('active-cycle');
            } else {
                btn.innerText = "自动轮播：关";
                btn.classList.remove('active-cycle');
            }
        }

        function togglePlayState() {
            if (document.body.classList.contains('show-details')) {
                document.body.classList.remove('show-details');
                return;
            }
            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
        }

        function resetView() {
            if (viewer) {
                applyInitialLayout();
                isPlaying = true;
                document.body.classList.remove('paused', 'show-details');
                
                targetNaviScale = 1.0; 
                // 由于有 JS 插值引擎，修改 targetNaviScale 会自动丝滑地缩小回去
            }
        }

        function toggleFullscreen(e) {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if(document.exitFullscreen) document.exitFullscreen();
            }
        }

        function toggleDetails(e) { e.stopPropagation(); document.body.classList.toggle('show-details'); }
        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused', 'show-details'); loadArt(parseInt(val)); }
        function adjustSpeed(delta) { let dir = scrollStep > 0 ? 1 : -1; scrollStep = (Math.abs(scrollStep) + delta) * dir; scrollStep = Math.max(0.000005, Math.min(0.0002, Math.abs(scrollStep))) * dir; }
        function reverseDir() { scrollStep = -scrollStep; }

        if ('serviceWorker' in navigator) { window.addEventListener('load', function() { navigator.serviceWorker.register('sw.js').catch(err=>{}); }); }
        window.onload = initGallery;
    </script>
</body>
</html>
