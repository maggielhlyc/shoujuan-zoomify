<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 17.0 沉浸进馆版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#221F1C">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #221F1C; --accent-color: #d4a017; --panel-bg: rgba(30, 25, 20, 0.98); --text-color: rgba(230, 210, 180, 0.9); }
        html, body { width: 100%; height: 100%; background: var(--bg-color); overflow: hidden; font-family: "STSong", "SimSun", serif; color: var(--text-color); }
        
        /* --- 1. 开场遮罩：进馆仪式 --- */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #1a1714; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; transition: opacity 1.2s ease, visibility 1.2s;
        }
        #enter-overlay.fade-out { opacity: 0; visibility: hidden; }
        #enter-btn {
            padding: 2vh 6vh; background: none; border: 1px solid var(--accent-color);
            color: var(--accent-color); font-size: 3vh; cursor: pointer; letter-spacing: 15px; padding-left: 30px;
            transition: all 0.5s;
        }
        #enter-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 30px rgba(212, 160, 23, 0.3); }

        /* --- 2. 展示区与滤镜 --- */
        #viewer { width: 100vw; height: 100vh; background: var(--bg-color); filter: contrast(1.05) sepia(0.04); }
        body.paused { cursor: default; }

        /* --- 3. 导览图：调整至主图上方附近 --- */
        #navi-outer {
            position: absolute; 
            top: 42vh; /* 设在屏幕中线上方一点，紧贴长卷上沿 */
            left: 0; width: 100vw; display: flex; justify-content: center; 
            z-index: 150; pointer-events: none; transition: transform 0.5s ease;
        }
        #navi-container { 
            width: 100vw; height: 6vh; background: rgba(0,0,0,0.4); 
            border-top: 1px solid rgba(212, 160, 23, 0.1);
            border-bottom: 1px solid rgba(212, 160, 23, 0.2); 
            opacity: 0.5; transition: all 0.5s; 
        }
        /* 暂停态：导览图稍微上移，为标题腾空间，并变亮 */
        body.paused #navi-outer { transform: translateY(-8vh); }
        body.paused #navi-container { opacity: 1; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--accent-color); pointer-events: auto; }

        /* --- 4. 标题区 --- */
        #header-zone { position: absolute; top: -15vh; left: 0; width: 100%; height: 12vh; display: flex; align-items: center; justify-content: center; transition: top 0.5s ease; z-index: 100; }
        body.paused #header-zone { top: 30vh; /* 标题跟随导览图一起出现在中心区 */ }
        #art-title { font-size: 3vh; color: var(--accent-color); letter-spacing: 6px; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* --- 5. 底部控制栏 --- */
        #control-bar { position: absolute; bottom: -15vh; left: 0; width: 100%; height: 12vh; display: flex; align-items: center; justify-content: center; gap: 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); transition: bottom 0.4s ease; z-index: 110; }
        body.paused #control-bar { bottom: 0; }
        body.show-details #control-bar { bottom: 40vh; background: none; }

        #details-panel { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 100%); width: 90%; height: 40vh; background: var(--panel-bg); border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; border-radius: 20px 20px 0 0; padding: 40px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 105; overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.2vh; box-shadow: 0 -15px 40px rgba(0,0,0,0.7); }
        body.show-details #details-panel { transform: translate(-50%, 0); }
        
        .btn { padding: 1vh 2vh; background: rgba(70, 60, 50, 0.8); color: var(--text-color); border: 1px solid var(--accent-color); border-radius: 4px; cursor: pointer; font-size: 1.6vh; }
        .btn:hover { background: var(--accent-color); color: #000; }
        select { background: #1a1a1a; color: var(--text-color); border: 1px solid var(--accent-color); padding: 8px; font-size: 1.6vh; border-radius: 4px; }
    </style>
</head>
<body style="cursor: none;">

    <div id="enter-overlay">
        <div style="margin-bottom: 5vh; font-size: 2vh; letter-spacing: 10px; opacity: 0.6;">PRIVATE DIGITAL MUSEUM</div>
        <button id="enter-btn" onclick="enterMuseum()">进 馆</button>
    </div>

    <div id="viewer" onclick="handleMainClick()"></div>

    <div id="navi-outer">
        <div id="navi-container"></div>
    </div>

    <div id="header-zone">
        <div id="art-title">作品加载中...</div>
    </div>

    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button class="btn" onclick="adjustSpeed(-0.000005)">减速</button>
        <button class="btn" onclick="adjustSpeed(0.000005)">加速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        <button id="info-btn" class="btn" style="background:#4a3f35;" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" style="background:#2d4a35;" onclick="toggleFullscreen(event)">出 馆</button>
        <button class="btn" style="background:var(--accent-color); color:#000; font-weight:bold;" onclick="handleMainClick()">继续</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()"><div id="full-desc"></div></div>

    <script>
        var artworks = [
            {
                name: "01_张 同（清） 仿周之冕花卉卷",
                width: 21119, height: 1146,
                folder: "tiles/01_zhang_tong/",
                desc: "此卷为清代画家张同仿明代‘勾花点叶派’宗师周之冕之作。画面展现了四季花卉之生机，笔法清丽，设色典雅。"
            },
            {
                name: "02_高其佩 · 荷塘双鸭图", 
                width: 12867, height: 832,
                folder: "tiles/02_hua_tuo/", 
                desc: "高其佩指墨神品。摒弃毛笔，以指尖勾画。注意荷叶线条特有的‘毛辣’感，这是指墨艺术的精髓。"
            }
        ];

        var viewer, animationRequest, scrollStep = -0.00003, isPlaying = true, centerY = 0;

        // --- 仪式感：进馆逻辑 ---
        function enterMuseum() {
            // 尝试进入全屏
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) docEl.requestFullscreen();
            
            // 隐藏遮罩
            document.getElementById('enter-overlay').classList.add('fade-out');
            document.getElementById('fs-btn').innerText = "出 馆";
            isPlaying = true;
        }

        function initGallery() {
            const selector = document.getElementById('art-selector');
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
        }

        function loadArt(index) {
            let art = artworks[index];
            centerY = (art.height / art.width) / 2;
            if (viewer) viewer.destroy();
            if (animationRequest) cancelAnimationFrame(animationRequest);

            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder },
                canvasColor: '#221F1C',
                showNavigationControl: false,
                showNavigator: true,
                navigatorId: "navi-container",
                navigatorAutoFade: false,
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                defaultZoomLevel: 1.0,
                animationTime: 0,
                blendingTime: 0.1
            });

            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = art.name;
                document.getElementById('full-desc').innerText = art.desc;
                startAnimationLoop();
            });
        }

        function startAnimationLoop() {
            function step() {
                if (isPlaying && viewer && viewer.viewport) {
                    let currentPos = viewer.viewport.getCenter();
                    let newX = currentPos.x + scrollStep;
                    if (newX < -0.1) newX = 1.1; if (newX > 1.1) newX = -0.1;
                    viewer.viewport.panTo(new OpenSeadragon.Point(newX, centerY), true);
                }
                animationRequest = requestAnimationFrame(step);
            }
            animationRequest = requestAnimationFrame(step);
        }

        // --- 响应 Esc 键和全屏状态 ---
        function toggleFullscreen(e) {
            if (e) e.stopPropagation();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 监听全屏变化，自动更新按钮文字（支持 Esc 键）
        document.addEventListener('fullscreenchange', () => {
            const fsBtn = document.getElementById('fs-btn');
            if (document.fullscreenElement) {
                fsBtn.innerText = "出 馆";
            } else {
                fsBtn.innerText = "进 馆";
            }
        });

        function handleMainClick() {
            if (document.body.classList.contains('show-details')) {
                document.body.classList.remove('show-details');
                document.getElementById('info-btn').classList.remove('active');
                return;
            }
            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
            document.body.style.cursor = isPlaying ? "none" : "default";
        }

        function toggleDetails(e) {
            e.stopPropagation();
            document.body.classList.toggle('show-details');
            document.getElementById('info-btn').classList.toggle('active');
        }

        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused', 'show-details'); loadArt(parseInt(val)); }
        function adjustSpeed(delta) { 
            let currentDir = scrollStep > 0 ? 1 : -1;
            scrollStep = (Math.abs(scrollStep) + delta) * currentDir;
            scrollStep = Math.max(0.000005, Math.min(0.0002, Math.abs(scrollStep))) * currentDir;
        }
        function reverseDir() { scrollStep = -scrollStep; }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() { navigator.serviceWorker.register('sw.js'); });
        }

        window.onload = initGallery;
    </script>
</body>
</html>
