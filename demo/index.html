<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 76.6 完美兼容版 (修复黑屏+记忆比例+右侧起跑)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #221F1C; --accent-color: #d4a017; --panel-bg: rgba(30, 25, 20, 0.98); --text-color: rgba(230, 210, 180, 0.9); }
        
        /* 完美的 Flexbox 垂直布局 */
        html, body { 
            width: 100%; height: 100%; 
            background: var(--bg-color); overflow: hidden; 
            font-family: "STSong", "SimSun", serif; color: var(--text-color); cursor: none; 
            display: flex; flex-direction: column;
        }
        body.paused { cursor: default; }

        /* 顶层与底层视窗 */
        #top-wrapper { width: 100%; height: 30vh; position: relative; flex-shrink: 0; }
        .gap { height: 15px; flex-shrink: 0; }
        #bottom-wrapper { width: 100%; flex-grow: 1; position: relative; }
        .osd-viewer { width: 100%; height: 100%; }

        /* 原生追踪红框 */
        #red-box { position: absolute; border: 2px solid rgba(255, 0, 0, 0.8); pointer-events: none; z-index: 10; }

        #header-zone { position: absolute; top: -25vh; left: 0; width: 100%; height: 15vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); transition: top 0.4s ease; z-index: 100; padding: 0 5vw; pointer-events: none; }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 3.2vh; color: var(--accent-color); letter-spacing: 4px; font-weight: bold; text-align: center; }
        
        #control-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: auto; min-height: 80px; padding: 20px 20px 30px 20px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px; background: linear-gradient(to top, rgba(15,10,5,0.98) 40%, rgba(15,10,5,0.7) 80%, transparent); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), bottom 0.4s ease; z-index: 200; transform: translateY(100%); }
        body.paused #control-bar { transform: translateY(0); }
        body.show-details #control-bar { bottom: 40vh; transform: translateY(0); background: transparent; }
        
        .btn { padding: 1vh 1.8vh; background: rgba(20, 15, 10, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: rgba(255, 245, 230, 0.95); text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9); border: 1px solid rgba(212, 160, 23, 0.4); border-radius: 6px; cursor: pointer; font-size: 1.5vh; transition: all 0.2s ease; }
        .btn:hover { background: var(--accent-color); color: #000; text-shadow: none; }
        select { max-width: 35vw; background: rgba(20, 15, 10, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: var(--text-color); border: 1px solid rgba(212, 160, 23, 0.4); padding: 8px; font-size: 1.5vh; border-radius: 6px; outline: none; transition: all 0.2s ease;}
        .btn.active-cycle { background: rgba(76,175,80,0.4); border-color: #4CAF50; color: #fff; box-shadow: 0 0 10px rgba(76,175,80,0.5); }

        #details-panel { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 120%); opacity: 0; pointer-events: none; width: 90%; height: 40vh; background: var(--panel-bg); border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; border-radius: 20px 20px 0 0; padding: 40px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; z-index: 205; overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.2vh; box-shadow: 0 -15px 40px rgba(0,0,0,0.7); }
        body.show-details #details-panel { transform: translate(-50%, 0); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="top-wrapper"><div id="top-viewer" class="osd-viewer"></div><div id="red-box"></div></div>
    <div class="gap"></div>
    <div id="bottom-wrapper"><div id="bottom-viewer" class="osd-viewer"></div></div>

    <div id="header-zone"><div id="art-title">加载中...</div></div>
    
    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button id="cycle-btn" class="btn" onclick="toggleAutoCycle()">自动轮播：关</button>
        <button class="btn" onclick="adjustSpeed(-0.000005)">减速</button>
        <button class="btn" onclick="adjustSpeed(0.000005)">加速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        <button class="btn" onclick="zoomTopViewer(1/1.08)">导览-</button>
        <button class="btn" onclick="zoomTopViewer(1.08)">导览+</button>
        <button class="btn" onclick="resetView()">全景</button>
        <button id="info-btn" class="btn" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" onclick="toggleFullscreen(event)">全屏</button>
        <button class="btn" style="color:var(--accent-color); font-weight:bold; border-color:var(--accent-color);" onclick="togglePlayState()">继续</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()"><div id="full-desc"></div></div>

    <script>
        var artworks = [
            { name: "01_张 同（清） 仿周之冕花卉卷", width: 21119, height: 1146, folder: "tiles/01_zhang_tong/", desc: `手卷 设色纸本\nZHANG TONG FLOWERS AFTER ZHOU ZHIMIAN\nhand scroll; ink and color on paper` },
            { name: "02_华拓 祁连山卷-全卷", width: 12867, height: 832, folder: "tiles/02_hua_tuo/", desc: `作者华拓\n创作年代1987年作` },
            { name: "03_金楙 秋岩爽气卷", width: 5546, height: 582, folder: "tiles/03_jin_mao/", desc: `作者 金楙［清］画、喻筏［清］题` },
            { 
                name: "04_清明上河图_宋", 
                width: 395409, height: 7595, desc: `绢本 长卷 设色 24.8x528.7 厘米\n全卷画面内容丰富生动，集中概括地再现了12世纪北宋全盛时期都城汴京的生活面貌。`,
                folder: [
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_a/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_b/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 10492, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_c/" }, width: 10492 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_d/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_e/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 2863, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_f/" }, width: 2863 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_g/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 38778, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_h/" }, width: 38778 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_i/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 43276, height: 7595, tilesUrl: "tiles/04_qingmingshanghetu_song/part_j/" }, width: 43276 }
                ]
            },
            { 
                name: "05_清明上河图（辽博）-仇英", 
                width: 171899, height: 4399, 
                desc: `绢本  设色 31.3x1045 厘米\n此卷为仇英真迹无疑。`,
                folder: [
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height:4399, tilesUrl: "tiles/05_qingmingshanghetu_qiuying/part_a/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 4399, tilesUrl: "tiles/05_qingmingshanghetu_qiuying/part_b/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 4399, tilesUrl: "tiles/05_qingmingshanghetu_qiuying/part_c/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 21899, height: 4399, tilesUrl: "tiles/05_qingmingshanghetu_qiuying/part_d/" }, width: 21899 }
                ]
            },
            { 
                name: "06_明_周之冕_百花图", 
                width: 266710, height: 3778, desc: `纸本 长卷  32x1717 厘米\n图绘四季盛开的花卉，花儿红艳，叶儿碧绿，生机勃勃。`,
                folder: [
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 3778, tilesUrl: "tiles/06_baihuatu/part_a/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 3778, tilesUrl: "tiles/06_baihuatu/part_b/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 3778, tilesUrl: "tiles/06_baihuatu/part_c/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 3778, tilesUrl: "tiles/06_baihuatu/part_d/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 50000, height: 3778, tilesUrl: "tiles/06_baihuatu/part_e/" }, width: 50000 },
                    { tileSource: { type: 'zoomifytileservice', width: 16710, height: 3778, tilesUrl: "tiles/06_baihuatu/part_f/" }, width: 16710 }
                ]
            },
            { 
                name: "07_千里江山图-王希孟", 
                width: 150502, height: 6024, folder: "tiles/07_qianlijiangshantu-wangximeng/", desc: `绢本 长卷 青绿 51.5x1191.5 厘米\n《千里江山图》卷是北宋画家王希孟传世的唯一作品。` 
            }
        ];

        var bottomViewer, topViewer, animationRequest, scrollStep = -0.00003, isPlaying = true;
        var currentArtIndex = 0, isAutoCycle = false;
        var ignoreResize = false; // 核心护盾：拦截假 Resize 事件，保护记忆

        // ========================================================
        // 【修改：LocalStorage 记忆模块（只记忆缩放比例，绝对不记位置）】
        // ========================================================
        var galleryMemory = {
            currentArtIndex: 0, 
            isAutoCycle: false, 
            scrollStep: -0.00003, 
            artStates: {} // 只记录: { "0": { bZoom, tZoom }, ... }
        };

        function loadMemory() {
            try {
                var saved = localStorage.getItem('privateGalleryMemory_Z_Only');
                if (saved) {
                    var parsed = JSON.parse(saved);
                    // 摒弃 ES6 展开符，全面兼容老旧安卓系统
                    galleryMemory = Object.assign({}, galleryMemory, parsed);
                    currentArtIndex = galleryMemory.currentArtIndex !== undefined ? galleryMemory.currentArtIndex : 0;
                    isAutoCycle = galleryMemory.isAutoCycle || false;
                    scrollStep = galleryMemory.scrollStep || -0.00003;
                }
            } catch(e) {}
        }

        function saveMemory() {
            if (!bottomViewer || !topViewer || !bottomViewer.viewport || !topViewer.viewport) return;
            try {
                galleryMemory.currentArtIndex = currentArtIndex;
                galleryMemory.isAutoCycle = isAutoCycle;
                galleryMemory.scrollStep = scrollStep;
                galleryMemory.artStates[currentArtIndex] = {
                    bZoom: bottomViewer.viewport.getZoom(),
                    tZoom: topViewer.viewport.getZoom()
                };
                localStorage.setItem('privateGalleryMemory_Z_Only', JSON.stringify(galleryMemory));
            } catch(e) {}
        }

        function initGallery() {
            loadMemory();
            var selector = document.getElementById('art-selector');
            selector.innerHTML = ""; 
            artworks.forEach(function(art, index) {
                var opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            
            if (isAutoCycle) {
                var btn = document.getElementById('cycle-btn');
                btn.innerText = "自动轮播：开"; btn.classList.add('active-cycle');
            }

            loadArt(currentArtIndex);
            window.addEventListener('resize', handleSmartResize);

            setInterval(saveMemory, 1500);
            window.addEventListener('beforeunload', saveMemory);
            document.addEventListener('visibilitychange', function() { if (document.hidden) saveMemory(); });

            window.addEventListener('wheel', function(e) {
                var multiplier = e.deltaY < 0 ? 1.08 : (1/1.08); 
                if (document.getElementById('top-wrapper').contains(e.target)) {
                    if(isPlaying) return;
                    e.preventDefault(); e.stopImmediatePropagation();
                    zoomTopViewer(multiplier);
                } else if (document.getElementById('bottom-wrapper').contains(e.target)) {
                    if(isPlaying) return;
                    e.preventDefault(); e.stopImmediatePropagation();
                    if (bottomViewer && bottomViewer.viewport) bottomViewer.viewport.zoomTo(bottomViewer.viewport.getZoom() * multiplier);
                }
            }, { capture: true, passive: false });
        }

        function loadArt(index) {
            currentArtIndex = index;
            var art = artworks[index];
            
            if (animationRequest) { cancelAnimationFrame(animationRequest); animationRequest = null; }
            if (bottomViewer) { bottomViewer.destroy(); bottomViewer = null; }
            if (topViewer) { topViewer.destroy(); topViewer = null; }

            document.getElementById('bottom-viewer').innerHTML = '';
            document.getElementById('top-viewer').innerHTML = '';

            var finalTileSources;
            if (Array.isArray(art.folder)) {
                var currentAccumulatedX = 0;
                finalTileSources = art.folder.map(function(item) {
                    var config = { tileSource: item.tileSource, x: currentAccumulatedX / art.width, y: 0, width: item.width / art.width };
                    currentAccumulatedX += item.width;          
                    return config;
                });
            } else {
                finalTileSources = { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder };
            }

            var osdConfig = {
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: finalTileSources, canvasColor: 'transparent',
                showNavigationControl: false, showNavigator: false, 
                gestureSettingsMouse: { clickToZoom: false, dblClickToZoom: false }, 
                visibilityRatio: 1.0, constrainDuringPan: true, blendingTime: 0.1
            };

            // 摒弃 ES6 展开符，全面兼容老旧安卓 WebView
            bottomViewer = OpenSeadragon(Object.assign({}, osdConfig, { id: "bottom-viewer", animationTime: 0.4, zoomPerScroll: 1.2 }));
            topViewer = OpenSeadragon(Object.assign({}, osdConfig, { id: "top-viewer", animationTime: 0.3, zoomPerScroll: 1.3 }));

            bottomViewer.addHandler('canvas-click', function(event) {
                if (!event.quick) return; event.preventDefaultAction = true; togglePlayState();
            });
            topViewer.addHandler('canvas-click', function(event) {
                if (event.quick) {
                    event.preventDefaultAction = true; 
                    var pt = topViewer.viewport.pointFromPixel(event.position);
                    bottomViewer.viewport.panTo(new OpenSeadragon.Point(pt.x, bottomViewer.viewport.getCenter().y));
                }
            });

            var isSyncing = false;
            topViewer.addHandler('pan', function() {
                if(isSyncing || isPlaying) return; isSyncing = true;
                bottomViewer.viewport.panTo(new OpenSeadragon.Point(topViewer.viewport.getCenter().x, bottomViewer.viewport.getCenter().y), true);
                isSyncing = false;
            });
            bottomViewer.addHandler('pan', function() {
                if(isSyncing || isPlaying) return; isSyncing = true;
                topViewer.viewport.panTo(new OpenSeadragon.Point(bottomViewer.viewport.getCenter().x, topViewer.viewport.getCenter().y), true);
                isSyncing = false;
            });

            var openCount = 0;
            function tryInit() {
                openCount++;
                if (openCount === 2) {
                    document.getElementById('art-title').innerText = artworks[currentArtIndex].name;
                    document.getElementById('full-desc').innerText = artworks[currentArtIndex].desc;
                    document.getElementById('art-selector').value = currentArtIndex;
                    
                    var mem = galleryMemory.artStates[currentArtIndex];
                    var startX = 1.05; // 无论有无记忆，永远从最右侧起跑

                    // 严密校验记忆数据的合法性，防止内存损坏导致的黑屏
                    if (mem && mem.bZoom && !isNaN(mem.bZoom) && mem.bZoom > 0) {
                        bottomViewer.viewport.zoomTo(mem.bZoom, null, true);
                        topViewer.viewport.zoomTo(mem.tZoom, null, true);
                        
                        var bVpHeight = (bottomViewer.viewport.getContainerSize().y / bottomViewer.viewport.getContainerSize().x) / mem.bZoom;
                        var tVpHeight = (topViewer.viewport.getContainerSize().y / topViewer.viewport.getContainerSize().x) / mem.tZoom;
                        
                        bottomViewer.viewport.panTo(new OpenSeadragon.Point(startX, bVpHeight / 2), true);
                        topViewer.viewport.panTo(new OpenSeadragon.Point(startX, (art.height / art.width) - (tVpHeight / 2)), true);
                    } else {
                        applyInitialLayout();
                    }

                    startAnimationLoop();

                    // ========================================================
                    // 【终极兼容防假死补丁】：完美模拟“点地址栏”，100% 唤醒老旧显卡
                    // ========================================================
                    [100, 500, 1000].forEach(function(delay) {
                        setTimeout(function() {
                            ignoreResize = true; // 举起护盾：不要洗掉我的缩放记忆
                            try { window.dispatchEvent(new Event('resize')); } 
                            catch(e) { 
                                var evt = document.createEvent('UIEvents'); 
                                evt.initUIEvent('resize', true, false, window, 0); 
                                window.dispatchEvent(evt); 
                            }
                            if(bottomViewer) bottomViewer.forceRedraw();
                            if(topViewer) topViewer.forceRedraw();
                            
                            setTimeout(function() { ignoreResize = false; }, 100); // 放下护盾
                        }, delay);
                    });
                }
            }

            bottomViewer.addHandler('open', tryInit);
            topViewer.addHandler('open', tryInit);
            bottomViewer.addHandler('animation', syncRedBox);
            topViewer.addHandler('animation', syncRedBox);
        }

        function syncRedBox() {
            if (!bottomViewer || !topViewer || !bottomViewer.viewport || !topViewer.viewport) return;
            try {
                var bounds = bottomViewer.viewport.getBounds(true);
                var tl = topViewer.viewport.pixelFromPoint(bounds.getTopLeft(), true);
                var br = topViewer.viewport.pixelFromPoint(bounds.getBottomRight(), true);
                var box = document.getElementById('red-box');
                if (box) {
                    box.style.left = tl.x + 'px'; box.style.width = (br.x - tl.x) + 'px';
                    box.style.top = Math.max(0, tl.y) + 'px'; box.style.height = (document.getElementById('top-wrapper').offsetHeight - Math.max(0, tl.y)) + 'px';
                }
            } catch(e) {}
        }

        function applyInitialLayout() {
            var art = artworks[currentArtIndex];
            var bContainer = bottomViewer.viewport.getContainerSize();
            var targetZoom = Math.min((art.width / (window.devicePixelRatio || 1)) / bContainer.x, (bContainer.y * 0.9 / bContainer.x) / (art.height / art.width)); 
            bottomViewer.viewport.zoomTo(targetZoom, null, true);
            
            bottomViewer.viewport.panTo(new OpenSeadragon.Point(1.05, 0), true);
            
            if(topViewer && topViewer.viewport) {
                topViewer.viewport.goHome(true);
                topViewer.viewport.panTo(new OpenSeadragon.Point(1.05, 0), true);
            }
        }

        // 收到模拟 Resize 时，因为有护盾，绝不重置画面
        function handleSmartResize() { 
            if (ignoreResize) return; 
            if (bottomViewer && bottomViewer.viewport) applyInitialLayout(); 
        }
        
        function zoomTopViewer(multiplier) { if (topViewer && topViewer.viewport) topViewer.viewport.zoomTo(topViewer.viewport.getZoom() * multiplier); }

        function startAnimationLoop() {
            function step() {
                if (bottomViewer && topViewer && bottomViewer.viewport && topViewer.viewport) {
                    var art = artworks[currentArtIndex];
                    var imgRatio = art.height / art.width;
                    var bVpHeight = (bottomViewer.viewport.getContainerSize().y / bottomViewer.viewport.getContainerSize().x) / bottomViewer.viewport.getZoom();
                    var tVpHeight = (topViewer.viewport.getContainerSize().y / topViewer.viewport.getContainerSize().x) / topViewer.viewport.getZoom();
                    
                    var bottomAnchorY = bVpHeight / 2;
                    var topAnchorY = imgRatio - (tVpHeight / 2);

                    if (isPlaying) {
                        var newX = bottomViewer.viewport.getCenter().x + scrollStep;
                        var leftLimit = bottomViewer.viewport.getBounds().width / 2;
                        
                        if (newX < leftLimit) {
                            if (isAutoCycle) { 
                                isPlaying = false; 
                                setTimeout(function() {
                                    isPlaying = true;
                                    loadArt((currentArtIndex + 1) % artworks.length); 
                                }, 500); // 留出 0.5 秒给画屏清空内存，防止崩溃
                                return; 
                            } 
                            else { newX = 1.1; } // 单图轮播到底后，重新回到最右侧
                        }
                        if (newX > 1.1) newX = -0.1;

                        bottomViewer.viewport.panTo(new OpenSeadragon.Point(newX, bottomAnchorY), true);
                        topViewer.viewport.panTo(new OpenSeadragon.Point(newX, topAnchorY), true);
                    } else {
                        bottomViewer.viewport.panTo(new OpenSeadragon.Point(bottomViewer.viewport.getCenter().x, bottomAnchorY), true);
                        topViewer.viewport.panTo(new OpenSeadragon.Point(topViewer.viewport.getCenter().x, topAnchorY), true);
                    }
                    syncRedBox();
                }
                animationRequest = requestAnimationFrame(step);
            }
            animationRequest = requestAnimationFrame(step);
        }

        function toggleAutoCycle() {
            isAutoCycle = !isAutoCycle;
            var btn = document.getElementById('cycle-btn');
            btn.innerText = isAutoCycle ? "自动轮播：开" : "自动轮播：关";
            btn.classList.toggle('active-cycle', isAutoCycle);
            saveMemory(); 
        }

        function togglePlayState() {
            if (document.body.classList.contains('show-details')) { document.body.classList.remove('show-details'); return; }
            isPlaying = !isPlaying; document.body.classList.toggle('paused', !isPlaying); saveMemory(); 
        }

        function resetView() {
            if (bottomViewer) {
                applyInitialLayout(); isPlaying = true; document.body.classList.remove('paused', 'show-details');
                if (galleryMemory.artStates[currentArtIndex]) { delete galleryMemory.artStates[currentArtIndex]; saveMemory(); }
            }
        }

        function toggleFullscreen(e) {
            e.stopPropagation();
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if(document.exitFullscreen) document.exitFullscreen();
        }

        function toggleDetails(e) { e.stopPropagation(); document.body.classList.toggle('show-details'); }
        function
