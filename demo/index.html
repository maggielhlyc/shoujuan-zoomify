<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 10.0 藏家高清定制版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        :root { 
            --bg-color: #221F1C; 
            --accent-color: #d4a017;
            --panel-bg: rgba(30, 25, 20, 0.98);
            --text-color: rgba(230, 210, 180, 0.9);
        }
        body { margin: 0; background: var(--bg-color); overflow: hidden; font-family: "STSong", "SimSun", serif; color: var(--text-color); cursor: none; }
        
        /* 核心展示区：彻底去除任何变暗滤镜 */
        #viewer { 
            width: 100vw; height: 100vh; background: var(--bg-color); 
            filter: contrast(1.05) sepia(0.05); /* 仅保留极微弱的暖色润色 */
            transition: none; 
        }
        body.paused { cursor: default; }
        /* 暂停时不改变亮度，保持 100% 清晰 */
        body.paused #viewer { filter: contrast(1.05) sepia(0.05); }

        /* 顶部标题区 */
        #header-zone {
            position: absolute; top: -20vh; left: 0; width: 100%; height: 15vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            transition: top 0.4s ease; z-index: 100;
        }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 3.5vh; color: var(--accent-color); letter-spacing: 10px; font-weight: bold; }

        /* 导航图（红框全图）：常驻上方 */
        #navi-outer {
            position: absolute; top: 2vh; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 150;
            pointer-events: none;
        }
        #navi-container {
            width: 80%; height: 7vh; 
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 160, 23, 0.2);
            opacity: 0.5;
            transition: all 0.4s;
        }
        body.paused #navi-container {
            opacity: 1;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--accent-color);
            pointer-events: auto;
            transform: translateY(12vh); /* 暂停时避开标题 */
        }

        /* 底部控制栏：暂停时显现 */
        #control-bar {
            position: absolute; bottom: -12vh; left: 0; width: 100%; height: 10vh;
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            transition: bottom 0.4s ease; z-index: 110;
        }
        body.paused #control-bar { bottom: 0; }
        /* 当作品志开启时，控制栏向上浮动 */
        body.show-details #control-bar { bottom: 35vh; background: none; }

        /* 作品志面板：点击按钮才升起 */
        #details-panel {
            position: absolute; bottom: -45vh; left: 50%; transform: translateX(-50%);
            width: 85%; height: 35vh; background: var(--panel-bg);
            border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none;
            border-radius: 15px 15px 0 0; padding: 35px;
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 105;
            overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 2.4vh;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
        }
        body.show-details #details-panel { bottom: 0; }

        /* UI 元素 */
        .btn { padding: 1.2vh 2.5vh; background: rgba(70, 60, 50, 0.8); color: var(--text-color); border: 1px solid var(--accent-color); border-radius: 4px; cursor: pointer; font-size: 1.7vh; }
        .btn:hover { background: var(--accent-color); color: #000; }
        .btn.active { background: var(--accent-color); color: #000; }
        select { background: #1a1a1a; color: var(--text-color); border: 1px solid var(--accent-color); padding: 10px; font-size: 1.7vh; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="viewer" onclick="handleMainClick()"></div>

    <div id="navi-outer">
        <div id="navi-container"></div>
    </div>

    <div id="header-zone">
        <div id="art-title">作品加载中...</div>
    </div>

    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button class="btn" onclick="adjustSpeed(-0.00002)">较慢速度</button>
        <button class="btn" onclick="reverseDir()">调换方向</button>
        <button class="btn" onclick="adjustSpeed(0.00002)">较快速度</button>
        <button id="info-btn" class="btn" style="background:#4a3f35;" onclick="toggleDetails(event)">作品志</button>
        <button class="btn" style="background:var(--accent-color); color:#000;" onclick="handleMainClick()">继续播放</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()">
        <div id="full-desc"></div>
    </div>

    <script>
        var artworks = [
            {
                name: "01_张 同（清） 仿周之冕花卉卷",
                width: 21119, height: 1146,
                folder: "tiles/01_zhang_tong/",
                desc: "此卷为清代画家张同仿明代‘勾花点叶派’宗师周之冕之作。画面展现了四季花卉之生机，笔法清丽，设色典雅。现在您可以点击‘作品志’查看这段文字，点击画面将保持原色原亮暂停。"
            },
            {
                name: "02_高其佩 · 荷塘双鸭图", 
                width: 12867, height: 832,
                folder: "tiles/02_hua_tuo/", 
                desc: "高其佩指墨神品。现在已完全去除了暂停时的变暗效果，方便您在100%亮度下观察画面细节。"
            }
        ];

        var viewer, scrollInterval, isPlaying = true, scrollStep = -0.00006;

        function initGallery() {
            const selector = document.getElementById('art-selector');
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
        }

        function loadArt(index) {
            let art = artworks[index];
            let centerY = (art.height / art.width) / 2;
            if (viewer) viewer.destroy();

            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder },
                canvasColor: '#221F1C',
                gestureSettingsMouse: { clickToZoom: false },
                showNavigationControl: false,
                showNavigator: true,
                navigatorId: "navi-container",
                navigatorAutoFade: false,
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                defaultZoomLevel: 1.0
            });

            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = art.name;
                document.getElementById('full-desc').innerText = art.desc;
                if (scrollInterval) clearInterval(scrollInterval);
                scrollInterval = setInterval(() => {
                    if (isPlaying) {
                        let cp = viewer.viewport.getCenter();
                        let nx = cp.x + scrollStep;
                        if (nx < -0.1) nx = 1.1; if (nx > 1.1) nx = -0.1;
                        viewer.viewport.panTo(new OpenSeadragon.Point(nx, centerY), true);
                    }
                }, 30);
            });
        }

        function handleMainClick() {
            // 如果作品志开着，先关掉作品志
            if (document.body.classList.contains('show-details')) {
                document.body.classList.remove('show-details');
                document.getElementById('info-btn').classList.remove('active');
                return;
            }

            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
        }

        function toggleDetails(e) {
            e.stopPropagation();
            document.body.classList.toggle('show-details');
            document.getElementById('info-btn').classList.toggle('active');
        }

        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused', 'show-details'); loadArt(parseInt(val)); }
        function adjustSpeed(delta) { scrollStep = (Math.abs(scrollStep) + delta) * (scrollStep > 0 ? 1 : -1); }
        function reverseDir() { scrollStep = -scrollStep; }

        window.onload = initGallery;
    </script>
</body>
</html>
