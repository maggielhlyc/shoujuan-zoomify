<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>桐观 - 私人数字书画珍藏馆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 强制覆盖任何可能隐藏鼠标的设定 */
        body { 
            background: #1a1514; 
            color: #E6D2B4; 
            font-family: "STSong", "SimSun", serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            cursor: default !important; /* 🌟 强制显示正常鼠标 */
        }
        
        h1 { 
            font-size: 64px; 
            color: #d4a017; 
            letter-spacing: 30px; 
            margin-bottom: 20px; 
            margin-right: -30px; 
            font-weight: normal; 
            text-shadow: 0 0 25px rgba(212, 160, 23, 0.4);
        }
        
        .subtitle {
            color: #888; 
            font-size: 16px; 
            letter-spacing: 10px;
            margin-bottom: 80px;
            margin-right: -10px;
        }

        .door-container { 
            display: flex; 
            gap: 60px; 
            z-index: 10; /* 确保门在最上层 */
        }
        
        .door { 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 280px;
            height: 80px;
            border: 1px solid rgba(212, 160, 23, 0.5); 
            color: #FFF5E6; 
            text-decoration: none; 
            font-size: 24px; 
            letter-spacing: 4px;
            transition: all 0.4s ease; 
            background: rgba(30, 25, 20, 0.6); 
            position: relative;
            overflow: hidden;
            cursor: pointer !important; /* 🌟 强制作指引手型 */
        }
        
        .door::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 160, 23, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .door:hover { 
            background: rgba(212, 160, 23, 0.15); 
            border-color: #d4a017;
            box-shadow: 0 0 30px rgba(212, 160, 23, 0.2); 
            transform: translateY(-5px);
        }
        
        .door:hover::before { left: 100%; }
    </style>
</head>
<body>

    <h1>桐 观</h1>
    <p class="subtitle">私人数字书画珍藏馆</p>
    
    <div class="door-container">
        <a href="sj_index.html" class="door">步 入 长 卷</a>
        <a href="lz_index.html" class="door">仰 观 高 山</a>
    </div>

</body>
</html>
