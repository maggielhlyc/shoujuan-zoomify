<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 16.0 终极展陈版</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#221F1C">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    
    <style>
        /* 1. 基础全局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg-color: #221F1C; 
            --accent-color: #d4a017; 
            --panel-bg: rgba(30, 25, 20, 0.98); 
            --text-color: rgba(230, 210, 180, 0.9); 
        }
        html, body { 
            width: 100%; height: 100%; 
            background: var(--bg-color); 
            overflow: hidden; 
            font-family: "STSong", "SimSun", serif; 
            color: var(--text-color);
            cursor: none; /* 播放时隐藏鼠标 */
        }
        
        /* 2. 核心展示区 */
        #viewer { 
            width: 100vw; height: 100vh; 
            background: var(--bg-color); 
            filter: contrast(1.05) sepia(0.04); 
        }
        body.paused { cursor: default; }

        /* 3. 导览图（红框全图）：100% 宽度铺满 */
        #navi-outer { 
            position: absolute; top: 0; left: 0; width: 100vw; 
            display: flex; justify-content: center; z-index: 150; 
            pointer-events: none; 
        }
        #navi-container { 
            width: 100vw; height: 7vh; 
            background: rgba(0,0,0,0.4); 
            border-bottom: 1px solid rgba(212, 160, 23, 0.2); 
            opacity: 0.6; 
            transition: all 0.4s ease; 
        }
        body.paused #navi-container { 
            opacity: 1; height: 9vh; 
            background: rgba(0,0,0,0.8); 
            border-bottom: 1px solid var(--accent-color); 
            pointer-events: auto; 
            transform: translateY(12vh); 
        }

        /* 4. 顶部标题区 */
        #header-zone { 
            position: absolute; top: -25vh; left: 0; width: 100%; height: 15vh; 
            display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
            transition: top 0.4s ease; z-index: 100; padding: 0 5vw; 
        }
        body.paused #header-zone { top: 0; }
        #art-title { font-size: 3.2vh; color: var(--accent-color); letter-spacing: 4px; font-weight: bold; text-align: center; line-height: 1.2; }

        /* 5. 底部控制栏 */
        #control-bar { 
            position: absolute; bottom: -15vh; left: 0; width: 100%; height: 12vh; 
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px; 
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); 
            transition: all 0.4s ease; z-index: 110; padding: 0 20px; 
        }
        body.paused #control-bar { bottom: 0; }
        /* 当显示作品志时，按钮栏上浮 */
        body.show-details #control-bar { bottom: 40vh; background: none; }

        /* 6. 作品志详情面板：完全隐藏，不露边 */
        #details-panel { 
            position: absolute; bottom: 0; left: 50%; 
            transform: translate(-50%, 100%); 
            width: 90%; height: 40vh; 
            background: var(--panel-bg); 
            border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; 
            border-radius: 20px 20px 0 0; padding: 40px; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 105; overflow-y: auto; text-align: justify; 
            line-height: 2.2; font-size: 2.2vh; 
            box-shadow: 0 -15px 40px rgba(0,0,0,0.7); 
        }
        body.show-details #details-panel { transform: translate(-50%, 0); }

        /* 按钮与交互元素 */
        .btn { padding: 1vh 1.8vh; background: rgba(70, 60, 50, 0.8); color: var(--text-color); border: 1px solid var(--accent-color); border-radius: 4px; cursor: pointer; font-size: 1.5vh; }
        .btn:hover { background: var(--accent-color); color: #000; }
        select { max-width: 35vw; background: #1a1a1a; color: var(--text-color); border: 1px solid var(--accent-color); padding: 8px; font-size: 1.5vh; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="viewer" onclick="handleMainClick()"></div>

    <div id="navi-outer">
        <div id="navi-container"></div>
    </div>

    <div id="header-zone">
        <div id="art-title">作品加载中...</div>
    </div>

    <div id="control-bar">
        <select id="art-selector" onchange="switchArt(this.value)"></select>
        <button class="btn" onclick="adjustSpeed(-0.000005)">减速</button>
        <button class="btn" onclick="adjustSpeed(0.000005)">加速</button>
        <button class="btn" onclick="reverseDir()">调转方向</button>
        <button id="info-btn" class="btn" style="background:#4a3f35;" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" style="background:#2d4a35;" onclick="toggleFullscreen(event)">全屏</button>
        <button class="btn" style="background:var(--accent-color); color:#000; font-weight:bold;" onclick="handleMainClick()">继续</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()">
        <div id="full-desc"></div>
    </div>

    <script>
        /****************************************************************
         * 【策展清单】
         ****************************************************************/
        var artworks = [
            {
                name: "01_张 同（清） 仿周之冕花卉卷",
                width: 21119, height: 1146,
                folder: "tiles/01_zhang_tong/",
                desc: `此卷为清代画家张同仿明代‘勾花点叶派’宗师周之冕之作。画面展现了四季花卉之生机，笔法清丽，设色典雅。此版为16.0终极版，支持安卓PWA沉浸式模式，导览图全屏铺满。`
            },
            {
                name: "02_新入藏作品", 
                width: 12867, height: 832,
                folder: "tiles/02_hua_tuo/", 
                desc: `12867像素长卷。采用原生动画帧同步技术（60fps），确保在大屏高倍缩放下的绝对丝滑。`
            }
        ];

        var viewer, animationRequest;
        var scrollStep = -0.00003; 
        var isPlaying = true;
        var centerY = 0;

        function initGallery() {
            const selector = document.getElementById('art-selector');
            artworks.forEach((art, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = (index+1) + ". " + art.name.split('_').pop();
                selector.appendChild(opt);
            });
            loadArt(0);
        }

        function loadArt(index) {
            let art = artworks[index];
            centerY = (art.height / art.width) / 2;
            if (viewer) viewer.destroy();
            if (animationRequest) cancelAnimationFrame(animationRequest);

            viewer = OpenSeadragon({
                id: "viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder },
                canvasColor: '#221F1C',
                gestureSettingsMouse: { clickToZoom: false },
                showNavigationControl: false,
                showNavigator: true,
                navigatorId: "navi-container",
                navigatorAutoFade: false,
                visibilityRatio: 1.0, 
                constrainDuringPan: true,
                defaultZoomLevel: 1.0,
                animationTime: 0,
                blendingTime: 0.1
            });

            viewer.addHandler('open', function() {
                document.getElementById('art-title').innerText = art.name;
                document.getElementById('full-desc').innerText = art.desc;
                startAnimationLoop();
            });
        }

        // --- 60fps 帧同步动画 ---
        function startAnimationLoop() {
            function step() {
                if (isPlaying && viewer && viewer.viewport) {
                    let currentPos = viewer.viewport.getCenter();
                    let newX = currentPos.x + scrollStep;
                    if (newX < -0.1) newX = 1.1; 
                    if (newX > 1.1) newX = -0.1;
                    viewer.viewport.panTo(new OpenSeadragon.Point(newX, centerY), true);
                }
                animationRequest = requestAnimationFrame(step);
            }
            animationRequest = requestAnimationFrame(step);
        }

        function handleMainClick() {
            if (document.body.classList.contains('show-details')) {
                document.body.classList.remove('show-details');
                document.getElementById('info-btn').classList.remove('active');
                return;
            }
            isPlaying = !isPlaying;
            document.body.classList.toggle('paused', !isPlaying);
        }

        function toggleDetails(e) {
            e.stopPropagation();
            document.body.classList.toggle('show-details');
            document.getElementById('info-btn').classList.toggle('active');
        }

        function toggleFullscreen(e) {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fs-btn').innerText = "退出";
            } else {
                document.exitFullscreen();
                document.getElementById('fs-btn').innerText = "全屏";
            }
        }

        function switchArt(val) { isPlaying = true; document.body.classList.remove('paused', 'show-details'); loadArt(parseInt(val)); }
        
        function adjustSpeed(delta) { 
            let currentDir = scrollStep > 0 ? 1 : -1;
            scrollStep = (Math.abs(scrollStep) + delta) * currentDir;
            scrollStep = Math.max(0.000005, Math.min(0.0002, Math.abs(scrollStep))) * currentDir;
        }

        function reverseDir() { scrollStep = -scrollStep; }

        window.onload = initGallery;
    </script>
</body>
</html>
