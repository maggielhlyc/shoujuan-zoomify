<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 立轴馆 (幻灯片智能版)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script src="openseadragon/openseadragon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 故宫深栗色背景 + 默认光标 */
        html, body { width: 100%; height: 100%; background: #1a1514; overflow: hidden; font-family: "STSong", "SimSun", serif; color: #E6D2B4; cursor: default; transition: background 1s ease; }
        
        /* 沉浸式隐身模式：隐藏鼠标和UI */
        body.idle { cursor: none; }
        body.idle #control-bar, body.idle #header-zone { opacity: 0; pointer-events: none; }

        /* 全屏唯一的展示区，上下留出 1.5% 缝隙，展现立轴悬浮感 */
        #main-viewer { position: absolute; top: 1.5%; bottom: 1.5%; left: 0; right: 0; opacity: 0; transition: opacity 0.8s ease-in-out; }
        #main-viewer.loaded { opacity: 1; }
        
        /* 悬浮呼吸阴影层（盖在背景之上，画作之下） */
        #breath-shadow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; animation: breath 6s infinite alternate ease-in-out; }
        @keyframes breath {
            0% { box-shadow: inset 0 0 60px rgba(0,0,0,0.6); }
            100% { box-shadow: inset 0 0 150px rgba(0,0,0,0.9); }
        }

        #header-zone { position: absolute; top: 30px; left: 0; width: 100%; text-align: center; transition: opacity 0.5s ease; z-index: 100; pointer-events: none; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        #art-title { display: inline-block; font-size: 26px; color: #d4a017; letter-spacing: 6px; font-weight: bold; }
        
        #control-bar { position: absolute; bottom: 20px; left: 0; width: 100%; padding: 10px; text-align: center; transition: opacity 0.5s ease; z-index: 200; }
        
        .btn, select { display: inline-block; margin: 4px; padding: 8px 14px; background: rgba(26, 21, 20, 0.8); color: #FFF5E6; border: 1px solid rgba(212, 160, 23, 0.4); border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s ease; vertical-align: middle; backdrop-filter: blur(4px); }
        .btn:hover, select:hover { background: #d4a017; color: #000; border-color: #d4a017; }
        .btn.active-play { background: rgba(212, 160, 23, 0.8); border-color: #d4a017; color: #000; font-weight: bold; }

        /* 立轴版作品志：右侧抽屉式滑出 */
        #details-panel { position: absolute; right: -450px; top: 0; width: 400px; height: 100%; background: rgba(26, 21, 20, 0.95); border-left: 1px solid rgba(212, 160, 23, 0.3); box-shadow: -10px 0 40px rgba(0,0,0,0.8); padding: 40px 30px; transition: right 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 205; overflow-y: auto; line-height: 2.2; font-size: 17px; text-align: justify; }
        body.show-details #details-panel { right: 0; }
        
        /* 自定义滚动条 */
        #details-panel::-webkit-scrollbar { width: 6px; }
        #details-panel::-webkit-scrollbar-thumb { background: #d4a017; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="breath-shadow"></div>
    <div id="main-viewer" class="osd-viewer"></div>

    <div id="header-zone"><div id="art-title">加载中...</div></div>
    
    <div id="control-bar">
        <select id="sel-dynasty" onchange="updateAuthor()" style="max-width: 120px;"></select>
        <select id="sel-author" onchange="updateArtwork()" style="max-width: 140px;"></select>
        <select id="sel-artwork" onchange="switchArt(this.value)" style="max-width: 250px;"></select>
        
        <select id="sel-interval" onchange="changeInterval()">
            <option value="10000">10 秒</option>
            <option value="30000">30 秒</option>
            <option value="60000" selected>1 分钟</option>
            <option value="180000">3 分钟</option>
        </select>
        
        <button id="play-btn" class="btn" onclick="togglePlay()">播放 / 暂停</button>
        <button class="btn" onclick="resetView()">全景 / 归位</button>
        <button id="info-btn" class="btn" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" onclick="toggleFullscreen(event)">全屏</button>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()">
        <h2 style="color:#d4a017; border-bottom:1px solid #444; padding-bottom:15px; margin-bottom:20px; font-size: 22px;">画卷释文</h2>
        <div id="full-desc"></div>
    </div>

    <script>
        var artworks = [
            { category: "近现代 - baixueshi", name: "lijiangyuge", width: 3561, height: 6330, folder: "lz_tiles/jinxiandai/baixueshi/lijiangyuge/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - chenchen", name: "mao", width: 1568, height: 5376, folder: "lz_tiles/jinxiandai/chenchen/mao/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - chenchen", name: "zixiaoyao", width: 3735, height: 3374, folder: "lz_tiles/jinxiandai/chenchen/zixiaoyao/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - huhanmin", name: "lishuqiyan", width: 2091, height: 5000, folder: "lz_tiles/jinxiandai/huhanmin/lishuqiyan/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - shenyizai", name: "shoutaotu", width: 2288, height: 9392, folder: "lz_tiles/jinxiandai/shenyizai/shoutaotu/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - wangzhen", name: "hehua", width: 1524, height: 2880, folder: "lz_tiles/jinxiandai/wangzhen/hehua/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - xiaoxuan", name: "shanlinqiuyan", width: 2690, height: 5000, folder: "lz_tiles/jinxiandai/xiaoxuan/shanlinqiuyan/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - xiejian", name: "zhushigaoshi", width: 707, height: 2880, folder: "lz_tiles/jinxiandai/xiejian/zhushigaoshi/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - xuxiaocun", name: "baiyunshenchu", width: 3216, height: 9120, folder: "lz_tiles/jinxiandai/xuxiaocun/baiyunshenchu/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "近现代 - zhangzhaoxiang", name: "huahuibaicai", width: 1835, height: 2870, folder: "lz_tiles/jinxiandai/zhangzhaoxiang/huahuibaicai/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "清代 - gaoqipei", name: "luyanshuangya_hua", width: 1232, height: 2043, folder: "lz_tiles/qing/gaoqipei/luyanshuangya_hua/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "清代 - gaoqipei", name: "luyanshuangya_zhou", width: 1756, height: 3122, folder: "lz_tiles/qing/gaoqipei/luyanshuangya_zhou/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "清代 - wuguxiang", name: "shanshui", width: 725, height: 2880, folder: "lz_tiles/qing/wuguxiang/shanshui/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "清代 - wushixian", name: "shanshui", width: 1392, height: 2880, folder: "lz_tiles/qing/wushixian/shanshui/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "清代 - zhuderun", name: "qiushanyinjv", width: 1819, height: 5000, folder: "lz_tiles/qing/zhuderun/qiushanyinjv/", desc: `请在此输入这幅传世名作的背景与赏析...` },
            { category: "清代 - zhuderun", name: "qiushnyinjv_huaxin", width: 1819, height: 4064, folder: "lz_tiles/qing/zhuderun/qiushnyinjv_huaxin/", desc: `请在此输入这幅传世名作的背景与赏析...` }
        ];

        // 全局变量区
        var viewer, slideTimer, idleTimer;
        var currentArtIndex = 0;
        var isPlaying = false; 
        var isZoomed = false; 
        var playInterval = 60000; 
        var isHoveringUI = false; 
        var isCanvasInteracting = false; 
        var catalogTree = {}; 

        // ==========================================
        // 菜单与数据逻辑
        // ==========================================
        function updateAuthor(targetAuthor, targetArtIndex) {
            var selDynasty = document.getElementById('sel-dynasty');
            var selAuthor = document.getElementById('sel-author');
            if (!selDynasty || !selAuthor) return; 

            var dynasty = selDynasty.value;
            var authors = catalogTree[dynasty];
            if (!authors) return; 

            selAuthor.innerHTML = '';
            var firstAuthor = null;

            for (var a in authors) {
                if (!firstAuthor) firstAuthor = a;
                var opt = document.createElement('option');
                opt.value = a; opt.text = a;
                selAuthor.appendChild(opt);
            }

            selAuthor.value = (targetAuthor && authors[targetAuthor]) ? targetAuthor : firstAuthor;
            updateArtwork(targetArtIndex); 
        }

        function updateArtwork(targetArtIndex) {
            var selDynasty = document.getElementById('sel-dynasty');
            var selAuthor = document.getElementById('sel-author');
            var selArtwork = document.getElementById('sel-artwork');
            if (!selDynasty || !selAuthor || !selArtwork) return; 

            var dynasty = selDynasty.value;
            var author = selAuthor.value;
            if (!catalogTree[dynasty] || !catalogTree[dynasty][author]) return; 

            selArtwork.innerHTML = '';
            var arts = catalogTree[dynasty][author];
            var firstIndex = null;

            arts.forEach(function(item) {
                if (firstIndex === null) firstIndex = item.index;
                var opt = document.createElement('option');
                opt.value = item.index; opt.text = item.name;
                selArtwork.appendChild(opt);
            });

            if (targetArtIndex !== undefined && targetArtIndex !== null) {
                selArtwork.value = targetArtIndex; 
            } else {
                selArtwork.value = firstIndex;
                switchArt(firstIndex); 
            }
        }

        function initGallery() {
            if (!artworks || artworks.length === 0) return;
            
            catalogTree = {};
            artworks.forEach(function(art, index) {
                var parts = (art.category || "未分类").split(" - ");
                var dynasty = parts[0] ? parts[0].trim() : "未分类";
                var author = parts[1] ? parts[1].trim() : "其他作者";

                if (!catalogTree[dynasty]) catalogTree[dynasty] = {};
                if (!catalogTree[dynasty][author]) catalogTree[dynasty][author] = [];
                catalogTree[dynasty][author].push({ index: index, name: art.name });
            });

            var selDynasty = document.getElementById('sel-dynasty');
            selDynasty.innerHTML = '';
            for (var d in catalogTree) {
                var opt = document.createElement('option');
                opt.value = d; opt.text = d;
                selDynasty.appendChild(opt);
            }

            var currentArt = artworks[currentArtIndex];
            var currParts = (currentArt.category || "未分类").split(" - ");
            selDynasty.value = currParts[0] ? currParts[0].trim() : "未分类";
            updateAuthor(currParts[1] ? currParts[1].trim() : "其他作者", currentArtIndex); 

            loadArt(currentArtIndex);
            setupIdleTimer(); 
            
            window.addEventListener('resize', function() { if(viewer) viewer.forceRedraw(); });
        }

        // ==========================================
        // 核心加载与淡入淡出转场 (包含安卓终极防弹补丁)
        // ==========================================
        function loadArt(index) {
            currentArtIndex = index;
            var art = artworks[index];
            if (!art) return;
            
            var viewerEl = document.getElementById('main-viewer');
            viewerEl.classList.remove('loaded');
            
            document.getElementById('art-title').innerText = art.name;
            document.getElementById('full-desc').innerText = art.desc;
            
            setTimeout(function() {
                if (viewer) { viewer.destroy(); viewer = null; }
                viewerEl.innerHTML = '';

                var finalTileSources;
                if (Array.isArray(art.folder)) {
                    var currentAccumulatedX = 0;
                    finalTileSources = art.folder.map(function(item) {
                        var config = { tileSource: item.tileSource, x: currentAccumulatedX / art.width, y: 0, width: item.width / art.width };
                        currentAccumulatedX += item.width;          
                        return config;
                    });
                } else {
                    finalTileSources = { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder };
                }

                viewer = OpenSeadragon({
                    id: "main-viewer",
                    prefixUrl: "openseadragon/images/",
                    tileSources: finalTileSources, 
                    canvasColor: 'transparent',
                    showNavigationControl: false, 
                    showNavigator: false, 
                    visibilityRatio: 1.0, 
                    constrainDuringPan: true, 
                    blendingTime: 0.1,
                    defaultZoomLevel: 0, 
                    minZoomImageRatio: 0.9 
                });

                viewer.addHandler('open', function() {
                    viewerEl.classList.add('loaded');
                    resetView(); 
                    manageSlideshow(); 
                });

                viewer.addHandler('zoom', function() {
                    var homeZoom = viewer.viewport.getHomeZoom();
                    var currentZoom = viewer.viewport.getZoom();
                    isZoomed = (currentZoom > homeZoom * 1.02);
                    manageSlideshow(); 
                });

                // 安卓防弹级监控：手指按下冻结倒计时
                viewer.addHandler('canvas-press', function() {
                    isCanvasInteracting = true; 
                    clearIdle(); 
                });
                
                // 手指松开开始 5.5 秒倒计时
                viewer.addHandler('canvas-release', function() {
                    isCanvasInteracting = false; 
                    startIdle(); 
                });

                viewer.addHandler('canvas-drag', clearIdle);
                viewer.addHandler('canvas-pinch', clearIdle);

                viewer.addHandler('canvas-click', function(event) {
                    if (!event.quick) return; 
                    event.preventDefaultAction = true; 
                    if (document.body.classList.contains('show-details')) {
                        toggleDetails(event); 
                    } else {
                        togglePlay(); 
                    }
                });

            }, 600); 
        }

        // ==========================================
        // 幻灯片与控制功能
        // ==========================================
        function manageSlideshow() {
            clearTimeout(slideTimer);
            var isReading = document.body.classList.contains('show-details');
            
            if (isPlaying && !isZoomed && !isReading) {
                slideTimer = setTimeout(function() {
                    var nextIdx = (currentArtIndex + 1) % artworks.length;
                    
                    var nextArt = artworks[nextIdx];
                    var parts = (nextArt.category || "未分类").split(" - ");
                    document.getElementById('sel-dynasty').value = parts[0] ? parts[0].trim() : "未分类";
                    updateAuthor(parts[1] ? parts[1].trim() : "其他作者", nextIdx);
                    
                }, playInterval);
            }
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            var btn = document.getElementById('play-btn');
            if (isPlaying) {
                btn.innerText = "播放中...";
                btn.classList.add('active-play');
                resetView(); 
                document.body.classList.remove('show-details');
            } else {
                btn.innerText = "播放 / 暂停";
                btn.classList.remove('active-play');
            }
            manageSlideshow();
        }

        function changeInterval() {
            playInterval = parseInt(document.getElementById('sel-interval').value);
            manageSlideshow(); 
        }

        function switchArt(val) { 
            isPlaying = false; 
            document.getElementById('play-btn').innerText = "播放 / 暂停";
            document.getElementById('play-btn').classList.remove('active-play');
            document.body.classList.remove('show-details'); 
            loadArt(parseInt(val)); 
        }

        function resetView() {
            if (viewer) {
                viewer.viewport.goHome(true);
                isZoomed = false;
                manageSlideshow();
            }
        }

        function toggleDetails(e) { 
            e.stopPropagation(); 
            document.body.classList.toggle('show-details'); 
            manageSlideshow(); 
        }

        function toggleFullscreen(e) {
            e.stopPropagation();
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if(document.exitFullscreen) document.exitFullscreen();
        }

        // ==========================================
        // 隐身模式：安卓底层防弹版 (终极完整版)
        // ==========================================
        function clearIdle() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
        }

        function startIdle() {
            clearTimeout(idleTimer);
            var isDetailsOpen = document.body.classList.contains('show-details');
            var isSelectActive = document.activeElement && document.activeElement.tagName === 'SELECT';

            if (!isCanvasInteracting && !isDetailsOpen && !isHoveringUI && !isSelectActive) {
                idleTimer = setTimeout(function() {
                    if (!isHoveringUI && !isCanvasInteracting) {
                        document.body.classList.add('idle');
                        if (document.activeElement) document.activeElement.blur(); 
                    }
                }, 5500); 
            }
        }

        function resetIdle() {
            clearIdle();
            startIdle();
        }

        function setupIdleTimer() {
            var ctrlBar = document.getElementById('control-bar');
            
            ctrlBar.addEventListener('mouseenter', function() { isHoveringUI = true; clearIdle(); });
            ctrlBar.addEventListener('mouseleave', function() { isHoveringUI = false; startIdle(); });
            ctrlBar.addEventListener('touchstart', function() { isHoveringUI = true; clearIdle(); }, {passive: true});
            ctrlBar.addEventListener('touchend', function() { isHoveringUI = false; startIdle(); }, {passive: true});
            
            var selects = document.querySelectorAll('select');
            selects.forEach(function(sel) {
                sel.addEventListener('focus', function() { isHoveringUI = true; clearIdle(); });
                sel.addEventListener('blur', function() { isHoveringUI = false; startIdle(); });
                sel.addEventListener('change', function() { isHoveringUI = false; sel.blur(); startIdle(); }); 
            });

            window.addEventListener('mousemove', resetIdle, true);
            window.addEventListener('mousedown', resetIdle, true);
            window.addEventListener('wheel', resetIdle, true);
            window.addEventListener('keydown', resetIdle, true);
            window.addEventListener('touchstart', resetIdle, true);
            window.addEventListener('pointermove', resetIdle, true);
            
            startIdle(); 
        }

        // 🌟 就是这句超级关键的“总电闸”，帮您补回来了！
        window.onload = initGallery;
    </script>
</body>
</html>
