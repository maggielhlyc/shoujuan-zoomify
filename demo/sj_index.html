<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人美术館 - 手卷馆 (76.11 策展特装版)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="桐观">
    <link rel="manifest" href="manifest.json">
    <script src="openseadragon/openseadragon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #221F1C; overflow: hidden; font-family: "STSong", "SimSun", serif; color: #E6D2B4; cursor: none; }
        body.paused { cursor: default; }

        #top-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 32%; overflow: hidden; border-bottom: 1px solid #333; }
        .gap { position: absolute; top: 32%; left: 0; width: 100%; height: 30px; background: transparent; }
        #bottom-wrapper { position: absolute; top: 32%; margin-top: 30px; left: 0; width: 100%; bottom: 0; overflow: hidden; }
        
        .osd-viewer { width: 100%; height: 100%; }
        .osd-viewer canvas { -webkit-transform: translateZ(0); transform: translateZ(0); }

        #red-box { position: absolute; border: 2px solid rgba(255, 0, 0, 0.8); pointer-events: none; z-index: 10; }

        #header-zone { position: absolute; top: -25%; left: 0; width: 100%; height: 15%; text-align: center; background: rgba(0,0,0,0.6); transition: top 0.4s ease; z-index: 100; pointer-events: none; }
        #header-zone:before { content: ''; display: inline-block; height: 100%; vertical-align: middle; }
        #art-title { display: inline-block; vertical-align: middle; font-size: 24px; color: #d4a017; letter-spacing: 4px; font-weight: bold; }
        body.paused #header-zone { top: 0; }
        
        #control-bar { position: absolute; bottom: -150px; left: 0; width: 100%; padding: 15px; text-align: center; background: rgba(15,10,5,0.85); transition: bottom 0.4s ease; z-index: 200; }
        body.paused #control-bar { bottom: 0; }
        body.show-details #control-bar { bottom: 40%; background: transparent; }
        
        .btn, select { display: inline-block; margin: 6px; padding: 8px 12px; background: rgba(20, 15, 10, 0.6); color: #FFF5E6; border: 1px solid rgba(212, 160, 23, 0.4); border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s ease; vertical-align: middle; }
        .btn:hover { background: #d4a017; color: #000; }
        select:hover { border-color: #d4a017; }
        select option { background: #1a1514; color: #E6D2B4; }

        /* 🌟 策展台专属 CSS 注入 🌟 */
        .custom-select-container { position: relative; display: inline-block; vertical-align: middle; margin: 6px; text-align: left; }
        .custom-select-header { padding: 8px 12px; background: rgba(20, 15, 10, 0.6); color: #FFF5E6; border: 1px solid rgba(212, 160, 23, 0.4); border-radius: 6px; cursor: pointer; font-size: 14px; min-width: 220px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; }
        .custom-select-header:hover { border-color: #d4a017; }
        .custom-select-list { position: absolute; bottom: 100%; left: 0; margin-bottom: 5px; background: rgba(26, 21, 20, 0.95); border: 1px solid rgba(212, 160, 23, 0.4); border-radius: 6px; max-height: 450px; overflow-y: auto; display: none; min-width: 100%; width: max-content; z-index: 300; box-shadow: 0 -5px 20px rgba(0,0,0,0.7); }
        .custom-select-list.open { display: block; }
        
        .batch-controls { display: flex; flex-direction: column; background: rgba(30, 25, 20, 1); border-bottom: 1px solid #d4a017; position: sticky; top: 0; z-index: 10; }
        .batch-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1px dashed rgba(212, 160, 23, 0.15); }
        .batch-row:last-child { border-bottom: none; }
        .batch-label { color: #bbb; font-size: 13px; }
        .batch-btns span { cursor: pointer; font-size: 12px; color: #d4a017; font-weight: bold; padding: 4px 8px; border-radius: 4px; margin-left: 5px; background: rgba(212, 160, 23, 0.1); transition: all 0.2s; }
        .batch-btns span:hover { background: #d4a017; color: #000; }
        
        .custom-select-item { padding: 10px 14px; cursor: pointer; color: #E6D2B4; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(212, 160, 23, 0.15); font-size: 14px; transition: background 0.2s ease; }
        .custom-select-item:hover { background: rgba(212, 160, 23, 0.2); color: #FFF; }
        .custom-select-item input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #d4a017; flex-shrink: 0; }
        .custom-select-item span.art-name { flex-grow: 1; white-space: nowrap; }

        #details-panel { position: absolute; bottom: -100%; left: 5%; width: 90%; height: 40%; background: rgba(30, 25, 20, 0.98); border: 1px solid rgba(212, 160, 23, 0.3); border-bottom: none; border-radius: 20px 20px 0 0; padding: 30px; transition: bottom 0.5s ease; z-index: 205; overflow-y: auto; text-align: justify; line-height: 2.2; font-size: 18px; display: none; }
        body.show-details #details-panel { bottom: 0; display: block; }
    </style>
</head>
<body>

    <div id="top-wrapper"><div id="top-viewer" class="osd-viewer"></div><div id="red-box"></div></div>
    <div class="gap"></div>
    <div id="bottom-wrapper"><div id="bottom-viewer" class="osd-viewer"></div></div>

    <div id="header-zone"><div id="art-title">加载中...</div></div>
    
    <div id="control-bar">
        <select id="sel-dynasty" onchange="onDynastyChange()" style="max-width: 120px;"></select>
        <select id="sel-author" onchange="onAuthorChange()" style="max-width: 140px;"></select>
        
        <div class="custom-select-container" id="custom-artwork-select">
            <div class="custom-select-header" id="custom-artwork-header" onclick="toggleArtworkDropdown(event)">加载中...</div>
            <div class="custom-select-list" id="custom-artwork-list"></div>
        </div>

        <select id="sel-play-mode" onchange="changePlayMode()" style="font-weight: bold; color: #d4a017;">
            <option value="stop">⏹ 停止轮播</option>
            <option value="all" selected>▶ 全部轮播</option>
            <option value="selected">☑ 选定轮播</option>
        </select>

        <button class="btn" onclick="adjustSpeed(-0.000005)">减速</button>
        <button class="btn" onclick="adjustSpeed(0.000005)">加速</button>
        <button class="btn" onclick="reverseDir()">调向</button>
        <button class="btn" onclick="zoomTopViewer(1/1.08)">导览-</button>
        <button class="btn" onclick="zoomTopViewer(1.08)">导览+</button>
        <button class="btn" onclick="resetView()">全景</button>
        <button id="info-btn" class="btn" onclick="toggleDetails(event)">作品志</button>
        <button id="fs-btn" class="btn" onclick="toggleFullscreen(event)">全屏</button>
        <button class="btn" style="color:var(--accent-color); font-weight:bold; border-color:var(--accent-color);" onclick="togglePlayState()">继续</button>
        <select onchange="if(this.value) window.location.href=this.value;" style="margin-left: 15px; color: #d4a017; border-color: #d4a017; font-weight: bold;">
            <option value="" disabled selected>🏛️ 切换展馆...</option>
            <option value="lz_index.html">仰观高山 (立轴馆)</option>
            <option value="sj_index.html">步入长卷 (手卷馆)</option>
            <option value="index.html">退回大门 (总大堂)</option>
        </select>
    </div>

    <div id="details-panel" onclick="event.stopPropagation()"><div id="full-desc"></div></div>

    <script>
        var artworks = [
            {
                category: "近现代 - 现代 华拓",
                name: "02_华拓 祁连山卷-全卷",
                width: 12867, height: 832,
                folder: "sj_tiles/jinxiandai/huatuo/02_hua_tuo/",
                desc: `作者华拓...`
            },
            {
                category: "明 - 明 仇英",
                name: "05_清明上河图（辽博）-仇英",
                width: 171899, height: 4339,
                folder: [
                    { tileSource: {"type":"zoomifytileservice","width":50000,"height":4339,"tilesUrl":"sj_tiles/ming/qiuyin/05_qingmingshanghetu_qiuying/part_a/"}, width: 50000 },
                    { tileSource: {"type":"zoomifytileservice","width":50000,"height":4339,"tilesUrl":"sj_tiles/ming/qiuyin/05_qingmingshanghetu_qiuying/part_b/"}, width: 50000 },
                    { tileSource: {"type":"zoomifytileservice","width":50000,"height":4339,"tilesUrl":"sj_tiles/ming/qiuyin/05_qingmingshanghetu_qiuying/part_c/"}, width: 50000 },
                    { tileSource: {"type":"zoomifytileservice","width":21899,"height":4339,"tilesUrl":"sj_tiles/ming/qiuyin/05_qingmingshanghetu_qiuying/part_d/"}, width: 21899 }
                ],
                desc: `材质尺寸：绢本...`
            }
            // ⚠️ 请在这里补全您所有的手卷数据
        ];

        var bottomViewer, topViewer, animationRequest, scrollStep = -0.00003, isPlaying = true;
        var currentArtIndex = 0;
        var catalogTree = {}; 
        var isArtworkDropdownOpen = false;
        
        var playMode = 'all'; // 默认全部轮播
        var galleryMemory = { currentArtIndex: 0, playMode: 'all', scrollStep: -0.00003, artStates: {} };

        function loadMemory() {
            try {
                var saved = localStorage.getItem('privateGallery_SJ_V8');
                if (saved) {
                    var parsed = JSON.parse(saved);
                    galleryMemory.currentArtIndex = parsed.currentArtIndex || 0;
                    galleryMemory.playMode = parsed.playMode || 'all';
                    galleryMemory.scrollStep = parsed.scrollStep || -0.00003;
                    galleryMemory.artStates = parsed.artStates || {};
                    currentArtIndex = galleryMemory.currentArtIndex;
                    playMode = galleryMemory.playMode;
                    scrollStep = galleryMemory.scrollStep;
                }
            } catch(e) {}
        }

        function saveMemory() {
            if (!bottomViewer || !topViewer || !bottomViewer.viewport || !topViewer.viewport) return;
            try {
                galleryMemory.currentArtIndex = currentArtIndex;
                galleryMemory.playMode = playMode;
                galleryMemory.scrollStep = scrollStep;
                galleryMemory.artStates[currentArtIndex] = {
                    bZoom: bottomViewer.viewport.getZoom(),
                    tZoom: topViewer.viewport.getZoom()
                };
                localStorage.setItem('privateGallery_SJ_V8', JSON.stringify(galleryMemory));
            } catch(e) {}
        }

        function initGallery() {
            if (!artworks || artworks.length === 0) return;
            loadMemory();
            
            if (currentArtIndex >= artworks.length || currentArtIndex < 0 || !artworks[currentArtIndex]) {
                currentArtIndex = 0;
            }
            
            catalogTree = {};
            artworks.forEach(function(art, index) {
                if(typeof art.selectedForSlide === 'undefined') art.selectedForSlide = true; 
                
                var parts = (art.category || "未分类").split(" - ");
                var dynasty = parts[0] ? parts[0].trim() : "未分类";
                var author = parts[1] ? parts[1].trim() : "其他作者";

                if (!catalogTree[dynasty]) catalogTree[dynasty] = {};
                if (!catalogTree[dynasty][author]) catalogTree[dynasty][author] = [];
                catalogTree[dynasty][author].push({ index: index, name: art.name });
            });

            var selDynasty = document.getElementById('sel-dynasty');
            selDynasty.innerHTML = '';
            for (var d in catalogTree) {
                var opt = document.createElement('option');
                opt.value = d; opt.text = d;
                selDynasty.appendChild(opt);
            }

            document.getElementById('sel-play-mode').value = playMode;

            var currParts = (artworks[currentArtIndex].category || "未分类").split(" - ");
            var currDynasty = currParts[0] ? currParts[0].trim() : "未分类";
            var currAuthor = currParts[1] ? currParts[1].trim() : "其他作者";
            selDynasty.value = currDynasty;

            window.addEventListener('click', function(e) {
                var container = document.getElementById('custom-artwork-select');
                var list = document.getElementById('custom-artwork-list');
                if (list && list.classList.contains('open') && (!container || !container.contains(e.target))) {
                    list.classList.remove('open');
                    isArtworkDropdownOpen = false;
                }
            });

            loadArt(currentArtIndex);
            
            window.addEventListener('resize', handleSmartResize);
            setInterval(saveMemory, 1500);
            window.addEventListener('beforeunload', saveMemory);
            
            window.addEventListener('wheel', function(e) {
                var multiplier = e.deltaY < 0 ? 1.01 : (1/1.01); 
                if (document.getElementById('top-wrapper').contains(e.target)) {
                    if(isPlaying) return;
                    e.preventDefault(); e.stopImmediatePropagation();
                    zoomTopViewer(multiplier);
                } else if (document.getElementById('bottom-wrapper').contains(e.target)) {
                    if(isPlaying) return;
                    e.preventDefault(); e.stopImmediatePropagation();
                    if (bottomViewer && bottomViewer.viewport) bottomViewer.viewport.zoomTo(bottomViewer.viewport.getZoom() * multiplier);
                }
            }, { capture: true, passive: false });
        }

        // ==========================================
        // 三级联动策展菜单逻辑
        // ==========================================
        function onDynastyChange() {
            var dynasty = document.getElementById('sel-dynasty').value;
            var firstAuthor = Object.keys(catalogTree[dynasty])[0];
            document.getElementById('sel-author').innerHTML = ''; 
            for (var a in catalogTree[dynasty]) {
                var opt = document.createElement('option');
                opt.value = a; opt.text = a;
                document.getElementById('sel-author').appendChild(opt);
            }
            document.getElementById('sel-author').value = firstAuthor;
            onAuthorChange();
        }

        function onAuthorChange() {
            var dynasty = document.getElementById('sel-dynasty').value;
            var author = document.getElementById('sel-author').value;
            var firstArtIndex = catalogTree[dynasty][author][0].index;
            switchArt(firstArtIndex); 
        }

        window.toggleSelection = function(level, state, e) {
            e.stopPropagation(); 
            var currentDynasty = document.getElementById('sel-dynasty').value;
            var currentAuthor = document.getElementById('sel-author').value;

            artworks.forEach(function(art) {
                var parts = (art.category || "未分类").split(" - ");
                var d = parts[0] ? parts[0].trim() : "未分类";
                var a = parts[1] ? parts[1].trim() : "其他作者";

                if (level === 'global') art.selectedForSlide = state;
                else if (level === 'dynasty' && d === currentDynasty) art.selectedForSlide = state;
                else if (level === 'author' && d === currentDynasty && a === currentAuthor) art.selectedForSlide = state;
            });
            syncMenusSilently(currentArtIndex); 
        };

        function syncMenusSilently(index) {
            var art = artworks[index];
            var parts = (art.category || "未分类").split(" - ");
            var dynasty = parts[0] ? parts[0].trim() : "未分类";
            var author = parts[1] ? parts[1].trim() : "其他作者";

            var selDynasty = document.getElementById('sel-dynasty');
            var selAuthor = document.getElementById('sel-author');

            if (selDynasty.value !== dynasty || selAuthor.options.length === 0) {
                selDynasty.value = dynasty;
                selAuthor.innerHTML = '';
                if(catalogTree[dynasty]) {
                    for (var a in catalogTree[dynasty]) {
                        var opt = document.createElement('option');
                        opt.value = a; opt.text = a;
                        selAuthor.appendChild(opt);
                    }
                }
            }
            selAuthor.value = author;

            var listEl = document.getElementById('custom-artwork-list');
            listEl.innerHTML = '';
            
            var actionsHTML = 
                '<div class="batch-controls">' +
                '<div class="batch-row"><span class="batch-label">🏛 全馆画作</span><div class="batch-btns"><span onclick="toggleSelection(\'global\', true, event)">☑ 全选</span><span onclick="toggleSelection(\'global\', false, event)">☐ 清空</span></div></div>' +
                '<div class="batch-row"><span class="batch-label">📜 朝代 (' + dynasty + ')</span><div class="batch-btns"><span onclick="toggleSelection(\'dynasty\', true, event)">☑ 全选</span><span onclick="toggleSelection(\'dynasty\', false, event)">☐ 清空</span></div></div>' +
                '<div class="batch-row"><span class="batch-label">🖌 作者 (' + author + ')</span><div class="batch-btns"><span onclick="toggleSelection(\'author\', true, event)">☑ 全选</span><span onclick="toggleSelection(\'author\', false, event)">☐ 清空</span></div></div>' +
                '</div>';
            listEl.innerHTML = actionsHTML;

            if(catalogTree[dynasty] && catalogTree[dynasty][author]) {
                catalogTree[dynasty][author].forEach(function(item) {
                    var div = document.createElement('div');
                    div.className = 'custom-select-item';
                    
                    var chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.checked = artworks[item.index].selectedForSlide;
                    chk.onclick = function(e) {
                        e.stopPropagation(); 
                        artworks[item.index].selectedForSlide = chk.checked;
                        if (currentArtIndex === item.index) updateArtworkHeader();
                    };

                    var span = document.createElement('span');
                    span.className = 'art-name';
                    span.innerText = item.name;

                    div.onclick = function(e) {
                        if (e.target !== chk) {
                            document.getElementById('custom-artwork-list').classList.remove('open');
                            isArtworkDropdownOpen = false;
                            switchArt(item.index);
                        }
                    };

                    div.appendChild(chk);
                    div.appendChild(span);
                    listEl.appendChild(div);
                });
            }
            updateArtworkHeader();
        }

        function updateArtworkHeader() {
            var art = artworks[currentArtIndex];
            if (!art) return;
            var header = document.getElementById('custom-artwork-header');
            var checkMark = art.selectedForSlide ? '<span style="color:#d4a017;font-weight:bold;margin-right:8px;">☑</span>' : '<span style="color:#888;font-weight:bold;margin-right:8px;">☐</span>';
            header.innerHTML = checkMark + art.name + ' <span style="font-size:10px; margin-left:10px;">▲</span>';
        }

        function toggleArtworkDropdown(e) {
            e.stopPropagation();
            var list = document.getElementById('custom-artwork-list');
            list.classList.toggle('open');
        }

        function switchArt(val) { 
            document.getElementById('sel-play-mode').value = 'stop';
            changePlayMode();
            loadArt(parseInt(val)); 
        }

        function changePlayMode() {
            playMode = document.getElementById('sel-play-mode').value;
            saveMemory();
            if (playMode !== 'stop') {
                isPlaying = true;
                document.body.classList.remove('paused', 'show-details');
            }
        }

        // ==========================================
        // 双屏渲染与控制
        // ==========================================
        function loadArt(index) {
            currentArtIndex = index;
            var art = artworks[index];
            if (!art) return;
            
            syncMenusSilently(index);
            
            if (animationRequest) { cancelAnimationFrame(animationRequest); animationRequest = null; }
            if (bottomViewer) { bottomViewer.destroy(); bottomViewer = null; }
            if (topViewer) { topViewer.destroy(); topViewer = null; }

            document.getElementById('bottom-viewer').innerHTML = '';
            document.getElementById('top-viewer').innerHTML = '';

            var finalTileSources;
            if (Array.isArray(art.folder)) {
                var currentAccumulatedX = 0;
                finalTileSources = art.folder.map(function(item) {
                    var config = { tileSource: item.tileSource, x: currentAccumulatedX / art.width, y: 0, width: item.width / art.width };
                    currentAccumulatedX += item.width;          
                    return config;
                });
            } else {
                finalTileSources = { type: 'zoomifytileservice', width: art.width, height: art.height, tilesUrl: art.folder };
            }

            var osdConfig = {
                prefixUrl: "openseadragon/images/",
                tileSources: finalTileSources, canvasColor: 'transparent',
                showNavigationControl: false, showNavigator: false, 
                gestureSettingsMouse: { clickToZoom: false, dblClickToZoom: false }, 
                visibilityRatio: 1.0, constrainDuringPan: true, blendingTime: 0.1, preserveViewport: true, preserveImageSizeOnResize: true
            };

            var bConfig = JSON.parse(JSON.stringify(osdConfig)); bConfig.id = "bottom-viewer"; bConfig.animationTime = 0.4; bConfig.zoomPerScroll = 1.05;
            var tConfig = JSON.parse(JSON.stringify(osdConfig)); tConfig.id = "top-viewer"; tConfig.animationTime = 0.3; tConfig.zoomPerScroll = 1.05;

            bottomViewer = OpenSeadragon(bConfig);
            topViewer = OpenSeadragon(tConfig);

            bottomViewer.addHandler('canvas-click', function(event) {
                if (!event.quick) return; event.preventDefaultAction = true; togglePlayState();
            });
            
            topViewer.addHandler('canvas-click', function(event) {
                if (!event.quick) return; 
                event.preventDefaultAction = true; 
                var pt = topViewer.viewport.pointFromPixel(event.position);
                bottomViewer.viewport.panTo(new OpenSeadragon.Point(pt.x, bottomViewer.viewport.getCenter().y));
            });

            var isSyncing = false;
            topViewer.addHandler('pan', function() {
                if(isSyncing || isPlaying) return; isSyncing = true;
                var art = artworks[currentArtIndex];
                var tx = topViewer.viewport.getCenter().x;
                topViewer.viewport.panTo(new OpenSeadragon.Point(tx, (art.height/art.width) - topViewer.viewport.getBounds().height / 2), true);
                bottomViewer.viewport.panTo(new OpenSeadragon.Point(tx, bottomViewer.viewport.getBounds().height / 2), true);
                isSyncing = false;
            });
            
            bottomViewer.addHandler('pan', function() {
                if(isSyncing || isPlaying) return; isSyncing = true;
                var art = artworks[currentArtIndex];
                var bx = bottomViewer.viewport.getCenter().x;
                bottomViewer.viewport.panTo(new OpenSeadragon.Point(bx, bottomViewer.viewport.getBounds().height / 2), true);
                topViewer.viewport.panTo(getClampedCenter(bx, 0, topViewer, art.height/art.width), true);
                isSyncing = false;
            });

            topViewer.addHandler('zoom', function() {
                if (isPlaying) return;
                var art = artworks[currentArtIndex];
                topViewer.viewport.panTo(getClampedCenter(topViewer.viewport.getCenter().x, 0, topViewer, art.height/art.width), true);
            });

            bottomViewer.addHandler('zoom', function() {
                if (isPlaying) return;
                bottomViewer.viewport.panTo(new OpenSeadragon.Point(bottomViewer.viewport.getCenter().x, bottomViewer.viewport.getBounds().height / 2), true);
            });

            var openCount = 0;
            function tryInit() {
                openCount++;
                if (openCount >= 2) {
                    var bContainer = bottomViewer.viewport.getContainerSize();
                    if (bContainer.x === 0 || bContainer.y === 0) { openCount--; setTimeout(tryInit, 50); return; }

                    document.getElementById('art-title').innerText = artworks[currentArtIndex].name;
                    document.getElementById('full-desc').innerText = artworks[currentArtIndex].desc;
                    
                    var mem = galleryMemory.artStates[currentArtIndex];
                    var startX = 1.05; 

                    if (mem && mem.bZoom && mem.bZoom > 0) {
                        bottomViewer.viewport.zoomTo(mem.bZoom, null, true);
                        topViewer.viewport.zoomTo(mem.tZoom, null, true);
                        
                        var bVpHeight = (bContainer.y / bContainer.x) / mem.bZoom;
                        bottomViewer.viewport.panTo(new OpenSeadragon.Point(startX, bVpHeight / 2), true);
                        
                        var imgRatio = artworks[currentArtIndex].height / artworks[currentArtIndex].width;
                        var clampedTop = getClampedCenter(startX, imgRatio / 2, topViewer, imgRatio);
                        topViewer.viewport.panTo(clampedTop, true);
                    } else {
                        applyInitialLayout();
                    }

                    startAnimationLoop();
                    setTimeout(function(){ if(!galleryMemory.artStates[currentArtIndex]) applyInitialLayout(); }, 800);
                }
            }

            bottomViewer.addHandler('open', tryInit);
            topViewer.addHandler('open', tryInit);
            bottomViewer.addHandler('animation', syncRedBox);
            topViewer.addHandler('animation', syncRedBox);
        }

        function getClampedCenter(targetX, targetY, viewer, imgRatio) {
            var bounds = viewer.viewport.getBounds();
            var vpWidth = bounds.width;
            var vpHeight = bounds.height;
            var cX, cY;
            
            if (vpWidth >= 1.0) { cX = 0.5; } 
            else { cX = Math.max(vpWidth / 2, Math.min(1.0 - vpWidth / 2, targetX)); }
            
            if (viewer.element.id === "top-viewer") { cY = imgRatio - (vpHeight / 2); } 
            else { cY = vpHeight / 2; }
            return new OpenSeadragon.Point(cX, cY);
        }

        function syncRedBox() {
            if (!bottomViewer || !topViewer || !bottomViewer.viewport || !topViewer.viewport) return;
            try {
                var bounds = bottomViewer.viewport.getBounds(true);
                var tl = topViewer.viewport.pixelFromPoint(bounds.getTopLeft(), true);
                var br = topViewer.viewport.pixelFromPoint(bounds.getBottomRight(), true);
                
                var box = document.getElementById('red-box');
                if (box) {
                    box.style.left = tl.x + 'px'; 
                    box.style.width = (br.x - tl.x) + 'px';
                    
                    var art = artworks[currentArtIndex];
                    var imgRatio = art.height / art.width;
                    var imgTopPixel = topViewer.viewport.pixelFromPoint(new OpenSeadragon.Point(0, 0), true);
                    var imgBottomPixel = topViewer.viewport.pixelFromPoint(new OpenSeadragon.Point(0, imgRatio), true);
                    
                    box.style.top = imgTopPixel.y + 'px'; 
                    box.style.height = (imgBottomPixel.y - imgTopPixel.y) + 'px';
                }
            } catch(e) {}
        }

        function applyInitialLayout() {
            var art = artworks[currentArtIndex];
            var imgRatio = art.height / art.width;
            bottomViewer.viewport.zoomTo(1.5, null, true); 
            bottomViewer.viewport.panTo(new OpenSeadragon.Point(1.05, bottomViewer.viewport.getBounds().height / 2), true);
            topViewer.viewport.goHome(true);
            var clampedTop = getClampedCenter(1.05, 0, topViewer, imgRatio);
            topViewer.viewport.panTo(clampedTop, true);
        }

        function handleSmartResize() {
            if (bottomViewer && bottomViewer.viewport) {
                bottomViewer.forceRedraw();
                if(topViewer) topViewer.forceRedraw();
                syncRedBox();
            }
        }
        
        function zoomTopViewer(multiplier) { if (topViewer && topViewer.viewport) topViewer.viewport.zoomTo(topViewer.viewport.getZoom() * multiplier); }

        function getNextArtIndex() {
            var startIdx = currentArtIndex;
            for(var i=1; i<=artworks.length; i++) {
                var nextIdx = (startIdx + i) % artworks.length;
                if(playMode === 'all') return nextIdx;
                if(playMode === 'selected' && artworks[nextIdx].selectedForSlide) return nextIdx;
            }
            return -1; 
        }

        function startAnimationLoop() {
            function step() {
                if (bottomViewer && topViewer && bottomViewer.viewport && topViewer.viewport) {
                    var art = artworks[currentArtIndex];
                    var imgRatio = art.height / art.width;
                    
                    if (isPlaying) {
                        var bVpHeight = (bottomViewer.viewport.getContainerSize().y / bottomViewer.viewport.getContainerSize().x) / bottomViewer.viewport.getZoom();
                        var bottomAnchorY = bVpHeight / 2;
                        var topAnchorY = imgRatio / 2;

                        var newX = bottomViewer.viewport.getCenter().x + scrollStep;
                        var leftLimit = bottomViewer.viewport.getBounds().width / 2;
                        
                        if (newX < leftLimit) {
                            if (playMode !== 'stop') { 
                                isPlaying = false; 
                                setTimeout(function() {
                                    var nextIdx = getNextArtIndex();
                                    if(nextIdx !== -1 && nextIdx !== currentArtIndex) {
                                        isPlaying = true;
                                        loadArt(nextIdx); 
                                    } else if (nextIdx === -1) {
                                        document.getElementById('sel-play-mode').value = 'stop';
                                        changePlayMode();
                                    } else {
                                        newX = 1.1; // 仅选中了一幅，循环滚动
                                        isPlaying = true;
                                    }
                                }, 500); 
                                return; 
                            } 
                            else { newX = 1.1; } 
                        }
                        if (newX > 1.1) newX = -0.1;

                        bottomViewer.viewport.panTo(new OpenSeadragon.Point(newX, bottomAnchorY), true);
                        var clampedTop = getClampedCenter(newX, topAnchorY, topViewer, imgRatio);
                        topViewer.viewport.panTo(clampedTop, true);
                    }
                    syncRedBox();
                }
                animationRequest = requestAnimationFrame(step);
            }
            animationRequest = requestAnimationFrame(step);
        }

        function togglePlayState() {
            if (document.body.classList.contains('show-details')) { document.body.classList.remove('show-details'); return; }
            isPlaying = !isPlaying; document.body.classList.toggle('paused', !isPlaying); saveMemory(); 
        }

        function resetView() {
            if (bottomViewer) {
                applyInitialLayout(); isPlaying = true; document.body.classList.remove('paused', 'show-details');
                if (galleryMemory.artStates[currentArtIndex]) { delete galleryMemory.artStates[currentArtIndex]; saveMemory(); }
            }
        }

        function toggleFullscreen(e) {
            e.stopPropagation();
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if(document.exitFullscreen) document.exitFullscreen();
        }

        function toggleDetails(e) { e.stopPropagation(); document.body.classList.toggle('show-details'); }
        function adjustSpeed(delta) { 
            var dir = scrollStep > 0 ? 1 : -1; scrollStep = (Math.abs(scrollStep) + delta) * dir; 
            scrollStep = Math.max(0.000005, Math.min(0.0002, Math.abs(scrollStep))) * dir; saveMemory(); 
        }
        function reverseDir() { scrollStep = -scrollStep; saveMemory(); }

        window.onload = initGallery;
    </script>
</body>
</html>
