<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>张同（清）仿周之冕花卉卷 - 博物馆展陈版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        /* 背景改为温润的古纸色 #F2EBDC */
        body { margin: 0; background: #F2EBDC; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        #viewer { width: 100vw; height: 100vh; cursor: pointer; background: #F2EBDC; }
        
        /* 提示文字改为深色，适配浅色背景 */
        #status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(60, 60, 60, 0.6); 
            font-size: 14px;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status-indicator">点击屏幕：暂停/播放</div>

    <script>
        var isPaused = false; 
        var imgWidth = 21119;
        var imgHeight = 1146;
        var centerY = (imgHeight / imgWidth) / 2;

        var viewer = OpenSeadragon({
            id: "viewer",
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            tileSources: {
                type: 'zoomifytileservice',
                width: imgWidth,
                height: imgHeight,
                tilesUrl: 'https://maggielhlyc.github.io/shoujuan-zoomify/demo/'
            },
            // 锁定背景颜色
            canvasColor: '#F2EBDC',
            gestureSettingsMouse: { clickToZoom: false },
            minZoomImageRatio: 1.0,
            visibilityRatio: 1.0,
            constrainDuringPan: true,
            showNavigationControl: false, 
            defaultZoomLevel: 1.0
        });

        viewer.addHandler('open', function() {
            console.log("张同（清）仿周之冕花卉卷 - 雅集模式开启。");
            
            setInterval(function() {
                if (!isPaused) {
                    var currentPos = viewer.viewport.getCenter();
                    // 保持慢速欣赏花卉细节
                    var newX = currentPos.x - 0.00006; 
                    if (newX < -0.1) { newX = 1.1; } 
                    viewer.viewport.panTo(new OpenSeadragon.Point(newX, centerY), true);
                }
            }, 30); 
        });

        var viewerElement = document.getElementById('viewer');
        var indicator = document.getElementById('status-indicator');

        viewerElement.addEventListener('click', function() {
            isPaused = !isPaused;
            indicator.innerText = isPaused ? "已暂停（清·张同-仿周之冕花卉卷）" : "点击屏幕：暂停/播放";
            indicator.style.opacity = isPaused ? "1" : "0.6";
        });
    </script>
</body>
</html>
