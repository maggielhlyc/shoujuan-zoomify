<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高其佩指墨长卷 - 4K 纯净直连版</title>
    <script src="../openseadragon-bin-2.2.1/openseadragon.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        // 1. 初始化引擎（直接对接高其佩 21119 像素底稿）
        var viewer = OpenSeadragon({
            id: "viewer",
            // 按钮图标路径
            prefixUrl: "../openseadragon-bin-2.2.1/images/", 
            tileSources: {
                type: 'zoomifytileservice',
                width: 21119,
                height: 1146,
                tilesUrl: 'https://maggielhlyc.github.io/shoujuan-zoomify/'
            },
            showNavigationControl: false, // 隐藏所有按钮，保持画面纯净
            mouseNavEnabled: true,        // 允许鼠标缩放
            showNavigator: false,
            constrainDuringPan: true,
            defaultZoomLevel: 1.5,        // 初始缩放（针对 4K 屏微调）
            visibilityRatio: 1
        });

        // 2. 自动滚动逻辑：让长卷像流水一样在 43 寸大屏上滑动
        viewer.addHandler('open', function() {
            console.log("画卷已成功挂载！开始自动开卷...");
            
            setInterval(function() {
                var currentPos = viewer.viewport.getCenter();
                // 0.0001 是滚动速度，觉得快了就改成 0.00005，觉得慢了就改大
                var newX = currentPos.x + 0.00015; 
                
                // 滚到头了就回到起点重新开始
                if (newX > 1.2) { newX = -0.2; } 
                
                viewer.viewport.panTo(new OpenSeadragon.Point(newX, currentPos.y), true);
            }, 40); // 每 40 毫秒移动一次，视觉非常丝滑
        });
    </script>
</body>
</html>
