<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高其佩指墨长卷 - 4K 极客直连版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        // 既然程序读不懂 XML，我们直接把你在 XML 里看到的数字填在这里
        var viewer = OpenSeadragon({
            id: "viewer",
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            tileSources: {
                type: 'zoomifytileservice',
                width: 21119,   // 你的画卷宽度
                height: 1146,   // 你的画卷高度
                // 重点：这里指向存放 TileGroup 文件夹的那个【根目录】
                tilesUrl: 'https://maggielhlyc.github.io/shoujuan-zoomify/'
            },
            showNavigationControl: false,
            mouseNavEnabled: true,
            defaultZoomLevel: 1.0, 
            visibilityRatio: 1,
            constrainDuringPan: true,
            // 针对 43 寸屏的性能优化
            imageLoaderLimit: 10,
            smoothTileEdges: true
        });

        // 丝滑自动平移逻辑
        viewer.addHandler('open', function() {
            console.log("画卷已强行挂载成功！正在开屏...");
            
            setInterval(function() {
                var currentPos = viewer.viewport.getCenter();
                // 0.00012 是经过测试最适合 4K 屏欣赏指墨细节的速度
                var newX = currentPos.x + 0.00012; 
                
                // 滚到尽头自动回弹
                if (newX > 1.5) { newX = -0.2; } 
                
                viewer.viewport.panTo(new OpenSeadragon.Point(newX, currentPos.y), true);
            }, 30); 
        });
    </script>
</body>
</html>
