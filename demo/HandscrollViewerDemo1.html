<html>
    <head>
        <meta charset="UTF-8">
        <title>高其佩长卷 - 43寸 4K 数字展陈</title>
        <script src="./openseadragon-bin-2.2.1/openseadragon.js"></script>
        <script src="./handscrollviewer1.js"></script>
        <script src="./HandscrollViewerDemo1DziImages.js"></script>

        <style>
            body {
                margin: 0;
                padding: 0;
                background-color: black; /* 纯黑背景，完美融入 4K 屏 */
                overflow: hidden; /* 隐藏滚动条 */
            }
            /* 设定画卷容器：针对 4K 竖屏优化 */
            #handscrollviewer-main {
                width: 100%;
                height: 1500px; /* 在 4K 竖屏上的理想显示高度 */
                margin-top: 1000px; /* 垂直居中调整，你可以根据视觉效果微调这个值 */
                background-color: black;
            }
        </style>

        <script>
            var gaoViewer;
            window.onload = function() {
                // 加载高其佩长卷
                gaoViewer = new HandscrollViewer("gaoqipei", "handscrollviewer-main");

                // --- 自动播放核心设置 ---
                // 设置滚动速度：1.0 极慢，10.0 极快。建议 2.0 左右最适合赏画
                gaoViewer.setAutoScrollSpeedSetting(2.0);

                // 延迟 2 秒后自动开始向左滚动（即开卷）
                setTimeout(function() {
                    gaoViewer.startAutoScrollLeft();
                }, 2000);

                // 禁用右键和拖拽干扰
                document.body.oncontextmenu = function (e) { e.preventDefault(); };
            }
        </script>
    </head>
    
    <body>
        <div id="handscrollviewer-main"></div>
    </body>
</html>
