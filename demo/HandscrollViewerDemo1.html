<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高其佩指墨长卷 - 4K 博物馆级首映</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        /* 营造博物馆黑匣子展陈效果 */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000000; 
            overflow: hidden; 
        }
        /* 撑满 43 寸大屏 */
        #viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #000000; 
        }
    </style>
</head>
<body>

    <div id="viewer"></div>

    <script>
        // 初始化 OpenSeadragon 引擎
        var viewer = OpenSeadragon({
            id: "viewer",
            // 使用在线图标，确保 UI 纯净
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            tileSources: {
                type: 'zoomifytileservice',
                width: 21119, // 高其佩长卷原始尺寸
                height: 1146,
                // 重点！既然你搬家了，这就是正确的“门牌号”
                tilesUrl: 'https://maggielhlyc.github.io/shoujuan-zoomify/demo/' 
            },
            showNavigationControl: false, // 隐藏按钮，保持画卷纯净
            mouseNavEnabled: true,        // 允许手动缩放查看细节
            defaultZoomLevel: 1.0,        // 初始缩放比例
            visibilityRatio: 1,
            constrainDuringPan: true,
            imageLoaderLimit: 10,         // 针对大屏优化加载速度
            smoothTileEdges: true
        });

        // 丝滑自动开卷逻辑
        viewer.addHandler('open', function() {
            console.log("高其佩指墨长卷已成功挂载！正在开屏...");
            
            // 每 30 毫秒平移一点点，创造流水般的观感
            setInterval(function() {
                var currentPos = viewer.viewport.getCenter();
                // 0.00012 是速度，你可以根据 43 寸屏的视觉感微调这个数字
                var newX = currentPos.x + 0.00012; 
                
                // 自动循环：滚到尽头后自动回到开头
                if (newX > 1.5) { newX = -0.2; } 
                
                viewer.viewport.panTo(new OpenSeadragon.Point(newX, currentPos.y), true);
            }, 30); 
        });

        // 容错处理
        viewer.addHandler('open-failed', function(event) {
            console.error("加载失败，请检查 demo 文件夹内是否有 TileGroup0 文件夹：", event.message);
        });
    </script>
</body>
</html>
