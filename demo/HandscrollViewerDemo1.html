<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高其佩指墨长卷 - 4K 数字展陈</title>
    <script src="../handscrollviewer1.js"></script>
    <script src="../openseadragon-bin-2.2.1/openseadragon.min.js"></script>
    
    <style>
        /* 1. 打造博物馆黑匣子环境 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* 纯黑背景，与木质边框融为一体 */
            overflow: hidden; /* 隐藏浏览器滚动条 */
        }

        /* 2. 针对 43 寸 4K 屏优化的容器 */
        #handscrollviewer-main {
            width: 100vw;
            height: 100vh; /* 撑满整个 43 寸屏幕高度 */
            background-color: #000000;
        }

        /* 3. 隐藏所有碍眼的按钮，只留纯净画面 */
        .openseadragon-container {
            background-color: #000000 !important;
        }
    </style>
</head>
<body>

    <div id="handscrollviewer-main"></div>

    <script>
        window.onload = function() {
            // 4. 初始化播放器
            var viewer = new HandscrollViewer({
                id: "handscrollviewer-main",
                // 终极绝对路径，解决所有读取报错
                tileSources: ["https://maggielhlyc.github.io/shoujuan-zoomify/ImageProperties.xml"],
                
                // 自动播放设置
                autoScroll: true,         // 开启自动开卷
                autoScrollSpeed: 0.1,     // 滚动速度 (4K屏建议 0.1-0.2，越小越慢越优雅)
                autoScrollDirection: "right-to-left", // 从右向左开卷，符合古人习惯
                
                // 画面交互设置
                showNavigationControl: false, // 隐藏左上角控制按钮，保持纯净
                immediateRender: true,
                visibilityRatio: 1.0,
                constrainDuringPan: true,
                
                // 缩放设置：确保 1146 像素高的画在 4K 屏上居中
                defaultZoomLevel: 1, 
                minZoomLevel: 0.5,
                maxZoomLevel: 5
            });

            console.log("高其佩长卷已成功加载，准备首映！");
        };
    </script>
</body>
</html>
