<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高其佩指墨长卷 - 43寸4K首映</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        // 因为 B 链接通了，说明 ImageProperties.xml 就在 HTML 旁边
        // 直接写名字即可，绝对不会报 404
        var xmlPath = "ImageProperties.xml"; 

        var viewer = OpenSeadragon({
            id: "viewer",
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            tileSources: xmlPath, 
            showNavigationControl: false, // 隐藏按钮，追求极致纯净
            mouseNavEnabled: true,
            defaultZoomLevel: 1.2,        // 针对 43 寸竖屏自动适配
            visibilityRatio: 1,
            constrainDuringPan: true
        });

        // 丝滑自动播放逻辑
        viewer.addHandler('open', function() {
            console.log("高其佩长卷加载成功！正在缓缓开卷...");
            
            setInterval(function() {
                var currentPos = viewer.viewport.getCenter();
                // 这里的 0.00012 是速度，你可以根据 43 寸屏的体感微调
                var newX = currentPos.x + 0.00012; 
                
                // 循环逻辑：滚到底后平滑回到开头
                if (newX > 1.3) { newX = -0.3; } 
                
                viewer.viewport.panTo(new OpenSeadragon.Point(newX, currentPos.y), true);
            }, 30); 
        });

        viewer.addHandler('open-failed', function(e) {
            console.error("哎呀，还是没拉动：", e.message);
        });
    </script>
</body>
</html>
