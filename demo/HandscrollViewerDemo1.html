<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>私人云端美术馆 - 博物馆级全适配版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        /* 【万能底色：深沉古轴色 #DFD0AC】
           这个色号经过优化，能适配绝大部分清、明、元甚至宋代的纸绢色调 */
        body { 
            margin: 0; 
            background: #DFD0AC; 
            overflow: hidden; 
            font-family: "STSong", "SimSun", serif; 
        }
        #viewer { 
            width: 100vw; 
            height: 100vh; 
            cursor: pointer; 
            background: #DFD0AC; 
        }
        
        /* 交互提示：采用深古铜色，沉稳而不夺目 */
        #status-indicator {
            position: absolute;
            top: 20px;
            right: 25px;
            color: rgba(40, 30, 10, 0.5); 
            font-size: 13px;
            letter-spacing: 1px;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status-indicator">点击屏幕：暂停/继续</div>

    <script>
        var isPaused = false; 
        // 当前画卷参数（后续我们可以通过数组来切换这些数字）
        var currentArtwork = {
            width: 21119,
            height: 1146,
            name: "清 · 张同 - 仿周之冕花卉卷"
        };

        var centerY = (currentArtwork.height / currentArtwork.width) / 2;

        var viewer = OpenSeadragon({
            id: "viewer",
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            tileSources: {
                type: 'zoomifytileservice',
                width: currentArtwork.width,
                height: currentArtwork.height,
                tilesUrl: 'https://maggielhlyc.github.io/shoujuan-zoomify/demo/'
            },
            // 核心视觉配置
            canvasColor: '#DFD0AC', 
            gestureSettingsMouse: { clickToZoom: false },
            minZoomImageRatio: 0.8,
            visibilityRatio: 1.0,
            constrainDuringPan: true,
            showNavigationControl: false, 
            defaultZoomLevel: 1.0
        });

        viewer.addHandler('open', function() {
            console.log("艺术馆模式启动：已挂载 " + currentArtwork.name);
            
            setInterval(function() {
                if (!isPaused) {
                    var currentPos = viewer.viewport.getCenter();
                    // 慢速滚动逻辑：保持 0.00006 
                    var newX = currentPos.x - 0.00006; 
                    if (newX < -0.1) { newX = 1.1; } 
                    viewer.viewport.panTo(new OpenSeadragon.Point(newX, centerY), true);
                }
            }, 30); 
        });

        var viewerElement = document.getElementById('viewer');
        var indicator = document.getElementById('status-indicator');

        viewerElement.addEventListener('click', function() {
            isPaused = !isPaused;
            indicator.innerText = isPaused ? "已暂停 · " + currentArtwork.name : "点击屏幕：暂停/继续";
            indicator.style.opacity = isPaused ? "1" : "0.5";
        });
    </script>
</body>
</html>
