<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高其佩长卷 - 4K 终极版</title>
    <script src="../handscrollviewer1.js"></script>
    <script src="../openseadragon-bin-2.2.1/openseadragon.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #000000; overflow: hidden; }
        #handscrollviewer-main { width: 100vw; height: 100vh; background-color: #000000; }
    </style>
</head>
<body>
    <div id="handscrollviewer-main"></div>

    <script>
        window.onload = function() {
            // 直接定义 TileSource，不再让插件自己去猜
            var myTileSource = {
                type: 'zoomifytileservice',
                width: 21119,
                height: 1146,
                // 重点：这里必须指向包含 ImageProperties.xml 的那个【文件夹】路径，且末尾加斜杠
                tilesUrl: "https://maggielhlyc.github.io/shoujuan-zoomify/"
            };

            var viewer = new HandscrollViewer({
                id: "handscrollviewer-main",
                tileSources: [myTileSource], // 使用数组包裹对象
                
                // 自动播放设置
                autoScroll: true,
                autoScrollSpeed: 0.1, 
                autoScrollDirection: "right-to-left",
                
                // 基础显示设置
                showNavigationControl: false,
                defaultZoomLevel: 1,
                visibilityRatio: 1.0,
                constrainDuringPan: true
            });

            console.log("正在通过绝对路径加载高其佩长卷...");
        };
    </script>
</body>
</html>
